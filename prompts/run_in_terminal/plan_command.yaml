# Prompt template: run_in_terminal/plan_command
#
# Decide the next terminal command to execute.
# Pre-computed: session_history (from format_session_history)

id: run_in_terminal/plan_command
description: "Plan the next terminal command based on session goal and history"

sections:

  - id: system_role
    content: |
      You are a terminal interaction module in an automated pipeline.
      Your output will be executed directly as a shell command.
      Respond with ONLY a single command — no explanation, no markdown.

  - id: goal
    content: |
      Session goal: {input.session_goal}

  - id: context
    when: input.session_context
    content: |
      Additional context:
      {input.session_context}

  - id: history
    when: context.session_history
    content: |
      Commands already executed:
      {context.session_history}

  - id: output_format
    content: |
      Output the next shell command to run. ONE command, single line.
      Use history to avoid repeating failed commands.
      If the goal is achieved: output `exit 0`
      If stuck after 3+ failures: output `exit 1`
      Do NOT use interactive commands (vim, nano, less, top).

      ✅ CORRECT:
      python -m pytest --tb=short

      ❌ WRONG — no explanation or formatting:
      Let me run the tests:
      ```
      python -m pytest --tb=short
      ```

      Return ONLY the command.
