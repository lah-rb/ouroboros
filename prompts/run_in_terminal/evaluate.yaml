# Prompt template: run_in_terminal/evaluate
#
# Evaluate whether to continue running commands or close the session.
# This is a simple continue/close decision — the terminal does NOT
# judge success or failure. That judgment belongs to the calling flow.

id: run_in_terminal/evaluate
description: "Decide whether to continue or close the terminal session"

sections:

  - id: system_role
    content: |
      You are managing a terminal session in an automated pipeline.
      Decide whether to run more commands or close the session.

  - id: persona
    content: |
      Your role: {input.execution_persona}

  - id: turn_info
    when: context.turn_count
    content: |
      Commands executed so far: {context.turn_count}

  - id: last_output
    when: context.last_command_output
    content: |
      Last command output:
      {context.last_command_output}

  - id: output_format
    content: |
      Should you run more commands, or is the session done?

      CLOSE the session when:
      - The program ran and you observed its behavior (success or failure)
      - You hit an error and have enough info to report it
      - You've run 5+ commands without making progress
      - The goal has been achieved

      CONTINUE when:
      - You need to run additional commands to fully observe behavior
      - The first command was setup (cd, ls) and you haven't run the actual program yet

      Your job is to RUN and OBSERVE, not to fix issues.
      Do NOT install packages, edit files, or attempt repairs.

      Choose from the options presented below.
