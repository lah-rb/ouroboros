# Prompt template: design_and_plan/generate_plan
#
# Generate task plan aligned to architecture.
# Uses the condensed flow set and standard phase structure.
#
# Pre-computed context keys:
#   architecture_listing — formatted architecture for prompt

id: design_and_plan/generate_plan
description: "Generate task plan aligned to architecture blueprint"

sections:

  - id: system_role
    content: |
      You are a planning module in an automated coding pipeline.
      Your output will be parsed by a JSON extractor. Do NOT include any text
      outside the JSON array — no markdown, no explanation, no commentary.

  - id: context
    content: |
      Objective: {context.mission_objective}
      Working directory: {context.working_directory}

  - id: architecture
    content: |
      ## Architecture Blueprint (AUTHORITATIVE)
      {context.architecture_listing}

  - id: existing_files
    when: context.project_file_list
    content: |
      ## Existing files (already created — do NOT create these again)
      {context.project_file_list}

  - id: instructions
    content: |
      Create a task plan as a JSON array following this STANDARD STRUCTURE:

      **Phase 1 — project_ops**: Set up the project environment.
      One task: install dependencies, create config files, initialize tooling.
      Skip this phase ONLY if the project has no dependencies.

      **Phase 2 — file_write**: Create source files in creation_order.
      One task PER FILE from the architecture's creation_order list.
      Each task MUST have depends_on linking to files it imports from.
      Skip files that already exist (listed above).

      **Phase 3 — interact**: Use the product.
      One task: run the application and verify it works as intended.
      This depends on ALL file_write tasks.

      AVAILABLE FLOW TYPES (you MUST specify one for each task):
        file_write    — Create or modify a source file
        project_ops   — Install dependencies, create config, manage tooling
        interact      — Run and use the product, test specific features

      DEPENDENCY RULES:
        - A file_write task for X.py MUST depend_on the file_write task for
          every file that X.py imports from (per the architecture's imports_from).
        - The interact task MUST depend_on ALL file_write tasks.
        - project_ops has no dependencies (runs first).

  - id: output_format
    content: |
      Return ONLY a raw JSON array:
      [
        {
          "description": "Set up project environment and install dependencies",
          "flow": "project_ops",
          "inputs": {},
          "depends_on": []
        },
        {
          "description": "Create data models module",
          "flow": "file_write",
          "inputs": {"target_file_path": "models.py"},
          "depends_on": []
        },
        {
          "description": "Create command parser",
          "flow": "file_write",
          "inputs": {"target_file_path": "parser.py"},
          "depends_on": ["Create data models module"]
        },
        {
          "description": "Run the application and verify it works",
          "flow": "interact",
          "inputs": {},
          "depends_on": ["Create data models module", "Create command parser"]
        }
      ]

      Rules:
      - File paths MUST match the architecture exactly.
      - Every task MUST include a "flow" field from the available types.
      - Every file_write task MUST have correct depends_on chains.
      - Do NOT create diagnose_issue or quality tasks — these are automatic.
      - Do NOT create per-file validation tasks — file_write validates internally.
      - Return ONLY the raw JSON array.
