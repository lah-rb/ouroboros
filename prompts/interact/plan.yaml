# Prompt template: interact/plan
#
# Craft an execution_persona for the run_session sub-flow.
#
# The persona is the ONLY context the terminal model receives.
# It must be self-contained: who the tester is, what the project does,
# how to launch it, how to interact, and what to focus on.
#
# Design informed by SillyTavern community persona research:
#   - Author framing > character possession ("acting as" > "you are")
#   - First interaction example anchors behavior style
#   - Under 300 tokens — LLMs deprioritize buried instructions
#   - PList-style traits for role, natural language for action plan
#   - Most important instruction (focus/findings) goes LAST
#
# Output: a single string — the execution_persona. NOT JSON.

id: interact/plan
description: "Craft a self-contained execution persona for product interaction"

sections:

  - id: system_role
    content: |
      You are crafting a brief role-description for a terminal session model.
      The model will act out this role by running shell commands and observing
      output. Your role-description must be completely self-contained — it is
      the ONLY context the terminal model will see.

      Write the persona as a SHORT text block (under 200 words). Do NOT
      produce JSON, markdown, or structured data — just the persona text.

  - id: task
    content: |
      ## What to test
      {input.flow_directive}

  - id: project_context
    when: context.project_file_list
    content: |
      ## Project files (use these to understand what the project does)
      {context.project_file_list}

  - id: repo_map
    when: context.repo_map_formatted
    content: |
      ## Project structure (use these to understand how to run/interact)
      {context.repo_map_formatted}

  - id: notes
    when: input.relevant_notes
    content: |
      ## Notes (architecture, run command, conventions)
      {input.relevant_notes}

  - id: output_format
    content: |
      Write a persona block that includes ALL of the following:

      1. ROLE — one line establishing who the tester is and their approach
         Use author framing: "Acting as a [role] exploring [project]..."

      2. LAUNCH — the exact command to start the project
         Read the project files and notes above to determine this.
         If you see pyproject.toml + uv.lock, use "uv run python [main_file]"

      3. INTERACTION — 2-3 concrete things to try, with actual commands
         Don't say "test the features" — say "type 'go north', 'talk bartender'"
         Read the code structure to infer what commands/inputs exist.

      4. FOCUS — what to report, what counts as a finding (this goes LAST)

      Example of a good persona:

        [Role: meticulous beta tester exploring a CLI text adventure;
         Approach: tries commands naturally, explores corners, notices inconsistencies]
        Start by running `uv run python main.py`. When you see the game prompt,
        type 'look' to survey the area. Move with 'go north/south/east/west'.
        Talk to NPCs with 'talk [name]' and try different dialogue choices.
        Focus: report any commands that crash, dialogue that cuts off abruptly,
        rooms described but unreachable, or items that can't be used.

      Write ONLY the persona text. No preamble, no explanation, no JSON.
