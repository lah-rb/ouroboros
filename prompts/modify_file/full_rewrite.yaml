# Prompt template: modify_file/full_rewrite
#
# Full file rewrite fallback — used when AST editing is unavailable
# or the model requested a structural change.
# Pre-computed context keys:
#   file_excerpts — repo map with symbol signatures for all project files
#   target_file_content — full content of the file being rewritten

id: modify_file/full_rewrite
description: "Full file rewrite when AST editing is unavailable"

sections:

  - id: system_role
    content: |
      You are a code modification module in an automated pipeline.
      Your output will be parsed for file blocks and written directly to disk.
      Produce the COMPLETE modified file — do not include text outside the file block.

  - id: task
    content: |
      ## Task
      {input.flow_directive}

  - id: validation_errors
    when: input.validation_errors
    content: |
      ## Validation Errors to Fix
      {input.validation_errors}

  - id: current_file
    content: |
      ## Current File: {input.target_file_path}
      ```
      {context.target_file_content}
      ```

  - id: related_files
    when: context.file_excerpts
    content: |
      ## Project Structure (symbol signatures — READ-ONLY REFERENCE)
      These are the interfaces defined in other project files.
      Preserve compatibility with these when rewriting.
      {context.file_excerpts}

  - id: architecture
    when: input.relevant_notes
    content: |
      ## Architecture & Import Conventions
      {input.relevant_notes}

      CRITICAL: When modifying this file, maintain correct imports from
      other project modules. Do NOT redefine types that exist in other files.

  - id: output_format
    content: |
      Produce the COMPLETE modified file. Preserve all working code.
      Change only what is needed to address the task.
      The output file MUST be similar in size to the current file.
      Do NOT remove functions, classes, or methods that are not related
      to the fix — they are used by other modules.

      ✅ CORRECT format:
      === FILE: {input.target_file_path} ===
      ```python
      # complete modified file content — ALL existing code preserved
      ```

      ❌ WRONG — no explanation outside the file block:
      I fixed the import error by changing line 12:
      === FILE: {input.target_file_path} ===
      ```python
      ...
      ```
      The issue was a circular import.

  - id: rules
    content: |
      RULES:
      - One file block with the COMPLETE modified file.
      - Preserve all functionality not related to the modification.
      - NOTHING before the file block or after it.
