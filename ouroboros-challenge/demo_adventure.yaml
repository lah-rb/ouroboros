# Demo Adventure Game World Data
# This file defines the game world for the text adventure engine.
# Contains: 6 rooms, 4 items, 2 NPCs with branching dialogue

rooms:
  - id: entrance_hall
    name: Entrance Hall
    description: You stand in a grand entrance hall with marble floors and tall columns. A heavy wooden door leads north, and a passage winds to the east.
    exits:
      north: library
      east: courtyard
    items:
      - old_map
    npcs:
      - guard

  - id: library
    name: Ancient Library
    description: Shelves line the walls, filled with dusty tomes and scrolls. A soft light filters through high windows. The hall lies to the south.
    exits:
      south: entrance_hall
      west: study
    items:
      - dusty_book

  - id: courtyard
    name: Sunlit Courtyard
    description: A peaceful garden with a stone fountain and blooming roses. Pathways lead in all directions, and birds sing overhead.
    exits:
      west: entrance_hall
      north: greenhouse
      east: tower_base
    items: []

  - id: greenhouse
    name: Overgrown Greenhouse
    description: Glass panes let in the sunlight, illuminating rows of exotic plants. Some vines have started growing through cracks in the walls.
    exits:
      south: courtyard
    items:
      - strange_key

  - id: study
    name: Scholar's Study
    description: A cluttered room with books piled high and a large desk covered in notes and diagrams. A comfortable chair sits behind the desk.
    exits:
      east: library
    items: []

  - id: tower_base
    name: Tower Base
    description: The base of an ancient stone tower. A spiral staircase winds upward into darkness, and the courtyard lies to the west.
    exits:
      west: courtyard
      up: tower_top
    items: []

items:
  - id: old_map
    name: Old Map
    description: A faded parchment showing a map of the estate with several locations marked.
    takeable: true

  - - dusty_book
    name: Dusty Book
    description: An ancient book bound in cracked leather. It smells of old paper and ink.
    takeable: true

  - - strange_key
    name: Strange Key
    description: A small, ornate key made of silver with a symbol of an eye etched on the bow.
    takeable: true

  - - dusty_book
    name: Scholar's Notes
    description: A collection of notes and diagrams on ancient languages and symbols.
    takeable: true

npcs:
  - id: guard
    name: Guard
    description: A stern-looking sentinel in weathered armor stands at attention near the entrance.
    dialogue:
      - trigger: hello
        response: "Greetings, traveler. The estate is quiet today. Have you seen the library?"
        next_state: polite

      - trigger: library
        response: "The library holds many secrets. I've heard whispers of a dusty book containing ancient knowledge."
        next_state: curious

      - trigger: strange_key
        response: "A key? I haven't seen one like that, but the greenhouse gardener might know something."
        next_state: helpful

      - default:
          response: "I must remain vigilant. The estate requires protection at all hours."

  - id: gardener
    name: Gardener
    description: An elderly woman with dirt-stained hands tends to the plants in the greenhouse.
    dialogue:
      - trigger: hello
        response: "Ah, a visitor! I haven't had much company lately. How can I help you?"
        next_state: friendly

      - trigger: strange_key
        response: "A key with an eye symbol? That belongs to the tower! Only the scholar has permission to go up there."
        next_state: informative

      - trigger: tower
        response: "The tower is closed since the scholar disappeared. But if you have that key, maybe..."
        next_state: mysterious

      - default:
          response: "These plants need constant care. It's peaceful work, but lonely sometimes."
