flow: test_inference
version: 1
description: "Test flow for Phase 3 — exercises inference action and LLM menu resolver"

input:
  required:
    - target_file_path
  optional:
    - question

defaults:
  config:
    temperature: 0.2
    max_tokens: 256

steps:
  read_file:
    action: read_files
    description: "Read the target file"
    params:
      target: "{{ input.target_file_path }}"
    resolver:
      type: rule
      rules:
        - condition: "result.file_found == true"
          transition: summarize
        - condition: "result.file_found == false"
          transition: file_not_found
    publishes:
      - target_file

  summarize:
    action: inference
    description: "Ask the model to summarize the file"
    context:
      required: [target_file]
    prompt: |
      Summarize the following file in 2-3 sentences.

      File: {{ context.target_file.path }}
      Content:
      {{ context.target_file.content }}
    config:
      temperature: 0.1
      max_tokens: 200
    resolver:
      type: llm_menu
      prompt: "Based on your analysis, what should we do next?"
      options:
        complete:
          description: "The summary is satisfactory, finish"
        analyze_deeper:
          description: "The file needs deeper analysis"
    publishes:
      - inference_response

  complete:
    action: log_completion
    description: "Summary complete"
    context:
      required: [inference_response]
    params:
      message: "File summarized successfully"
    terminal: true
    status: success
    publishes:
      - summary

  analyze_deeper:
    action: inference
    description: "Perform deeper analysis"
    context:
      required: [target_file, inference_response]
    prompt: |
      Provide a deeper analysis of this file, focusing on structure and patterns.

      File: {{ context.target_file.path }}
      Previous summary: {{ context.inference_response }}
      Content:
      {{ context.target_file.content }}
    config:
      temperature: 0.3
      max_tokens: 512
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: complete_deep
    publishes:
      - inference_response

  complete_deep:
    action: log_completion
    description: "Deep analysis complete"
    context:
      required: [inference_response]
    params:
      message: "Deep analysis completed"
    terminal: true
    status: success
    publishes:
      - summary

  file_not_found:
    action: log_completion
    description: "File not found"
    params:
      message: "Target file not found"
    terminal: true
    status: failed
    publishes:
      - summary

entry: read_file

overflow:
  strategy: split
  fallback: reorganize
