flow: mission_control
version: 1
description: >
  Top-level agent routing flow. Loads mission state, processes events,
  assesses progress, selects next task, dispatches to appropriate flow.
  All child flows tail-call back here on completion.

input:
  required:
    - mission_id
  optional:
    - last_result
    - last_status
    - last_task_id
    - quality_gate_retries

defaults:
  config:
    temperature: "t*0.5"

steps:

  # ── Phase 1: Load persistent state ──────────────────────────

  load_state:
    action: load_mission_state
    description: "Read mission state and event queue from persistence"
    resolver:
      type: rule
      rules:
        - condition: "result.mission.status == 'active'"
          transition: apply_last_result
        - condition: "result.mission.status == 'paused'"
          transition: idle
        - condition: "result.mission.status == 'completed'"
          transition: completed
        - condition: "result.mission.status == 'aborted'"
          transition: aborted
        - condition: "true"
          transition: aborted
    publishes:
      - mission
      - events
      - frustration

  # ── Phase 2: Integrate results from previous cycle ──────────

  apply_last_result:
    action: update_task_status
    description: "Apply the previous flow's outcome to mission state"
    context:
      required: [mission, frustration]
      optional: [events, last_result, last_status, last_task_id]
    resolver:
      type: rule
      rules:
        - condition: "result.events_pending == true"
          transition: process_events
        - condition: "result.task_completed == true"
          transition: check_retrospective
        - condition: "context.get('last_status') == 'abandoned'"
          transition: check_extension
        - condition: "true"
          transition: assess
    publishes:
      - mission
      - frustration

  # ── Phase 2b: Periodic retrospective check ─────────────────

  check_retrospective:
    action: noop
    description: >
      Check if a retrospective is due. Triggers every 5 completed tasks,
      when total frustration exceeds 8, or when 3+ tasks are blocked/failed.
    context:
      required: [mission, frustration]
    resolver:
      type: rule
      rules:
        - condition: >
            len([t for t in context.get('mission', {}).plan if t.status == 'complete']) % 5 == 0
            and len([t for t in context.get('mission', {}).plan if t.status == 'complete']) > 0
          transition: dispatch_retrospective
        - condition: >
            sum(context.get('frustration', {}).values()) >= 8
          transition: dispatch_retrospective
        - condition: >
            len([t for t in context.get('mission', {}).plan if t.status in ('blocked', 'failed')]) >= 3
          transition: dispatch_retrospective
        - condition: "true"
          transition: check_extension
    publishes: []

  dispatch_retrospective:
    action: noop
    description: "Dispatch to retrospective flow"
    context:
      required: [mission]
    tail_call:
      flow: retrospective
      input_map:
        mission_id: "{{ input.mission_id }}"
        trigger_reason: "Periodic trigger: milestone reached"

  # ── Phase 3: Process external events ────────────────────────

  process_events:
    action: handle_events
    description: "Process user messages, abort/pause signals"
    context:
      required: [mission, events]
      optional: [frustration]
    resolver:
      type: rule
      rules:
        - condition: "result.abort_requested == true"
          transition: aborted
        - condition: "result.pause_requested == true"
          transition: idle
        - condition: "true"
          transition: assess
    publishes:
      - mission
      - unblocked_tasks

  # ── Phase 3b: Check if mission should extend ────────────────

  check_extension:
    action: inference
    description: "Evaluate whether the mission plan needs extension based on progress"
    context:
      required: [mission]
      optional: [frustration]
    prompt: |
      You are a mission planning module in an automated coding pipeline.
      Your output will be parsed by a JSON extractor. Return ONLY a raw JSON
      object — no markdown, no explanation, no surrounding text.

      Mission objective: {{ context.mission.objective }}

      Current plan status:
      {% for task in context.mission.plan %}
      - [{{ task.status }}] {{ task.id }}: {{ task.description }}
        {% if task.summary %}Result: {{ task.summary }}{% endif %}
      {% endfor %}

      {% if context.mission.notes %}
      Recent observations:
      {% for note in context.mission.notes[-5:] %}
      - [{{ note.category }}] {{ note.content[:200] }}
      {% endfor %}
      {% endif %}

      Cross-check the objective against the plan:
      For EACH requirement in the objective, identify which task covers it.
      If any requirement has NO corresponding task, that is a gap that needs extension.

      Common gaps to check:
      - Does the objective mention tests? Is there a task that creates tests?
      - Does the objective mention integration between modules? Is there an integration task?
      - Does the objective specify a number of test cases? Will the test task produce that many?
      - Does the objective require CLI interfaces? Is there a task for each CLI tool?
      - Does the objective require modules to share code? Is there a task verifying they do?

      Suggest extensions if:
      - A numbered requirement in the objective has no task covering it
      - Completed work revealed a clearly missing component
      - A dependency was discovered that no existing task covers
      - The objective specifies integration but no integrate_modules task exists

      Do NOT suggest extensions if:
      - Every requirement in the objective has a corresponding task
      - All remaining tasks are sufficient to complete the objective

      ✅ CORRECT output when gaps exist:
      {"extend": true, "reason": "objective requires integration between pomodoro and tasks modules but no integrate_modules task exists", "observation": "Need to add integration verification task"}

      ✅ CORRECT output when plan is complete:
      {"extend": false, "reason": "every requirement in the objective has a corresponding task"}

      Return ONLY the raw JSON object.
    config:
      temperature: 0.1
      max_tokens: 200
    resolver:
      type: rule
      rules:
        - condition: "'extend\": true' in result.text"
          transition: invoke_revise_plan
        - condition: "'extend\":true' in result.text"
          transition: invoke_revise_plan
        - condition: "true"
          transition: assess
    publishes:
      - extension_check

  invoke_revise_plan:
    action: flow
    description: "Trigger plan revision based on new observations"
    flow: revise_plan
    input_map:
      mission_id: "{{ input.mission_id }}"
      observation: "{{ context.extension_check }}"
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: assess
    publishes:
      - revision_result

  # ── Phase 4: Assess and select ──────────────────────────────

  assess:
    action: assess_mission_progress
    description: "Determine what to work on next"
    context:
      required: [mission, frustration]
      optional: [unblocked_tasks]
    resolver:
      type: rule
      rules:
        - condition: "result.needs_plan == true"
          transition: dispatch_planning
        - condition: "result.all_tasks_complete == true and result.all_remaining_blocked == true"
          transition: completed
        - condition: "result.all_tasks_complete == true and result.get('quality_gate_exhausted', false) == true"
          transition: completed
        - condition: "result.all_tasks_complete == true"
          transition: quality_check
        - condition: "result.all_remaining_blocked == true"
          transition: idle
        - condition: "result.obvious_next_task != null"
          transition: prepare_dispatch
        - condition: "true"
          transition: idle
    publishes:
      - assessment
      - obvious_next_task

  # ── Phase 4b: Quality gate ──────────────────────────────────

  quality_check:
    action: flow
    description: "Run project-wide quality gate before completing"
    flow: quality_gate
    context:
      required: [mission]
    input_map:
      working_directory: "{{ context.mission.config.working_directory }}"
      mission_id: "{{ input.mission_id }}"
      mission_objective: "{{ context.mission.objective }}"
    resolver:
      type: rule
      rules:
        - condition: "result.status == 'success'"
          transition: completed
        - condition: "result.status == 'failed' and input.get('quality_gate_retries', '0') in ('0', '1')"
          transition: invoke_quality_fix
        - condition: "true"
          transition: completed
    publishes:
      - quality_results

  invoke_quality_fix:
    action: noop
    description: "Quality gate failed — tail-call to reload state with new fix tasks"
    context:
      optional: [mission, quality_results]
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        quality_gate_retries: "{{ (input.quality_gate_retries or 0)|int + 1 }}"

  # ── Phase 5: Configure and dispatch ─────────────────────────

  prepare_dispatch:
    action: configure_task_dispatch
    description: "Build input map and determine flow config for selected task"
    context:
      required: [mission, frustration]
      optional: [obvious_next_task, selected_task]
    params:
      frustration_thresholds:
        review: 2
        instructions: 4
        direct_fix: 5
      frustration_strategies:
        temperature_perturb:
          min_frustration: 2
          offset_range: [0.15, 0.4]
        research:
          min_frustration: 3
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: dispatch
    publishes:
      - dispatch_config

  dispatch:
    action: noop
    description: "Tail-call to the selected task flow"
    context:
      required: [dispatch_config, mission]
    tail_call:
      flow: "{{ context.dispatch_config.flow }}"
      input_map:
        mission_id: "{{ input.mission_id }}"
        task_id: "{{ context.dispatch_config.task_id }}"
        task_description: "{{ context.dispatch_config.input_map.task_description }}"
        mission_objective: "{{ context.dispatch_config.input_map.mission_objective }}"
        working_directory: "{{ context.dispatch_config.input_map.working_directory }}"
        target_file_path: "{{ context.dispatch_config.input_map.target_file_path }}"
        reason: "{{ context.dispatch_config.input_map.reason }}"
        temperature_multiplier: "{{ context.dispatch_config.input_map.temperature_multiplier }}"
        frustration_level: "{{ context.dispatch_config.input_map.frustration_level }}"
        frustration_history: "{{ context.dispatch_config.input_map.frustration_history }}"
        relevant_notes: "{{ context.dispatch_config.input_map.relevant_notes }}"

  # ── Dispatch to planning ────────────────────────────────────

  dispatch_planning:
    action: noop
    description: "No plan exists — dispatch to create_plan flow"
    context:
      required: [mission]
    tail_call:
      flow: create_plan
      input_map:
        mission_id: "{{ input.mission_id }}"

  # ── Terminal / parking states ───────────────────────────────

  completed:
    action: finalize_mission
    description: "Mark mission complete"
    context:
      optional: [mission, assessment, completion_assessment]
    terminal: true
    status: completed

  idle:
    action: enter_idle
    description: "Nothing to do — wait for events"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
      delay: 5

  aborted:
    action: finalize_mission
    description: "Mission aborted"
    context:
      optional: [mission]
    params:
      abort: true
    terminal: true
    status: aborted

entry: load_state

overflow:
  strategy: split
  fallback: reorganize
