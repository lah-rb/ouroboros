flow: capture_learnings
version: 1
description: >
  Reflect on completed work and persist observations as notes.
  Adjusts reflection prompt based on learning_focus parameter.

input:
  required:
    - task_description
  optional:
    - target_file_path
    - task_outcome
    - learning_focus
    - category
    - tags

defaults:
  config:
    temperature: "t*1"

steps:

  read_source:
    action: read_files
    description: "Read the actual file content for grounded reflection"
    params:
      target: "{{ input.target_file_path | default('') }}"
    resolver:
      type: rule
      rules:
        - condition: "result.file_found == true"
          transition: reflect
        - condition: "true"
          transition: reflect
    publishes:
      - target_file

  reflect:
    action: inference
    description: "Generate a reflection on what was learned"
    context:
      optional: [target_file]
    prompt: |
      You are a learning capture module in an automated coding pipeline.
      Your output will be stored as a note for future tasks to reference.
      Write concise, factual observations — not a summary of what you did.

      Task completed: {{ input.task_description }}
      {% if input.target_file_path %}
      File: {{ input.target_file_path }}
      {% endif %}
      {% if input.task_outcome %}
      Outcome: {{ input.task_outcome }}
      {% endif %}

      {% if context.target_file and context.target_file.content %}
      ACTUAL FILE CONTENT (ground your observations in THIS code only):
      {{ context.target_file.content[:2000] }}
      {% endif %}

      IMPORTANT: Base your observations ONLY on what you can see in the actual
      file content above. Do NOT invent details about frameworks, libraries,
      or patterns that are not explicitly present in the code. If the file
      uses standard library @dataclass, say "dataclass" — not "Pydantic v2".
      If functions are synchronous, do not claim they are async.

      {% if input.learning_focus == "file_creation" %}
      Focus on: What patterns did you establish? What dependencies does this
      file introduce? What should other files know about this one?
      {% elif input.learning_focus == "file_modification" %}
      Focus on: What was the root cause of the change? What assumptions were
      wrong? What could break if this area is changed again?
      {% elif input.learning_focus == "bug_fix" %}
      Focus on: What caused the bug? Is the fix complete or a workaround?
      Are there similar patterns elsewhere that might have the same issue?
      {% elif input.learning_focus == "test_failure" %}
      Focus on: Why did the test fail? Was the test wrong or the code?
      What does this reveal about the system's behavior?
      {% elif input.learning_focus == "failure_analysis" %}
      Focus on: What specifically went wrong? What tool, command, or resource
      was unavailable or produced an error? What should future tasks avoid
      or do differently? What assumption proved incorrect?
      {% else %}
      Focus on: dependencies discovered, patterns in the codebase,
      assumptions that proved wrong, integration points to remember.
      {% endif %}

      Write 2-4 sentences of plain prose. Do NOT use bullet points, headers,
      or numbered lists. Do NOT restate the task description. Focus only on
      information that would help a future task working on related code.

      Return ONLY the reflection text, nothing else.
    config:
      temperature: 0.2
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: save_note
        - condition: "true"
          transition: skip
    publishes:
      - inference_response

  save_note:
    action: push_note
    description: "Persist the reflection as a note"
    context:
      required: [inference_response]
    params:
      category: "{{ input.category | default('task_learning') }}"
      content_key: "inference_response"
      tags: []
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: complete
    publishes:
      - note_saved

  skip:
    action: noop
    description: "No reflection generated — skip note"
    terminal: true
    status: success

  complete:
    action: noop
    description: "Learning captured"
    terminal: true
    status: success

entry: read_source
