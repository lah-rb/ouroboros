flow: research_codebase_history
version: 1
description: >
  Investigate the history of code changes using git. Plans git commands
  based on a research question, executes them, and synthesizes the
  history into an actionable answer.

input:
  required:
    - research_query
  optional:
    - working_directory
    - target_file
    - time_range

defaults:
  config:
    temperature: "t*0.3"

steps:

  determine_git_commands:
    action: inference
    description: "Determine which git commands will answer the question"
    context:
      required: [research_query]
      optional: [target_file, time_range]
    prompt: |
      You need to investigate code history to answer this question:
      {{ context.research_query }}

      {% if context.target_file %}Target file: {{ context.target_file }}{% endif %}
      {% if context.time_range %}Time range: {{ context.time_range }}{% endif %}

      Which git commands would help? Choose from:
      - `git log --oneline -20 [file]`
      - `git log --oneline --since="2 weeks ago"`
      - `git blame [file]`
      - `git diff HEAD~5 -- [file]`
      - `git log --all --oneline --grep="keyword"`
      - `git show --stat HEAD~N`

      List 1-3 commands, most useful first. Write each command on its own line
      starting with `git `.
    config:
      temperature: "t*0.2"
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: execute_git_commands
        - condition: "true"
          transition: no_history
    publishes:
      - git_commands

  execute_git_commands:
    action: run_git_investigation
    description: "Execute the planned git commands and collect output"
    context:
      required: [git_commands]
    params:
      working_directory: "{{ input.working_directory }}"
      max_output_lines: 100
    resolver:
      type: rule
      rules:
        - condition: "result.any_output == true"
          transition: analyze_history
        - condition: "true"
          transition: no_history
    publishes:
      - git_output

  analyze_history:
    action: inference
    description: "Synthesize git output into an answer"
    context:
      required: [research_query, git_output]
    prompt: |
      You investigated git history to answer: {{ context.research_query }}

      ## Git Output
      {{ context.git_output }}

      Synthesize what the history tells you. Focus on:
      - What changed and when
      - Why it changed (from commit messages)
      - Patterns in the evolution
      - Relevant design decisions visible in the history

      Be concise and factual. Reference specific commits when relevant.
    config:
      temperature: "t*0.3"
    terminal: true
    status: success
    publishes:
      - raw_results

  no_history:
    action: noop
    description: "No git history available or no useful output"
    terminal: true
    status: failed

entry: determine_git_commands
