flow: prepare_context
version: 1
description: >
  Sub-flow that scans the workspace, asks the model which files
  are relevant to a given task, and returns a curated context bundle.
  Integrates web research when frustration indicates repeated failures.

input:
  required:
    - working_directory
    - task_description
  optional:
    - mission_objective
    - target_file_path
    - frustration_history
    - frustration_level
    - context_budget
    - relevant_notes

defaults:
  config:
    temperature: "t*0.5"
    context_budget: 8

steps:

  scan_workspace:
    action: scan_project
    description: "Walk directory tree, extract file signatures"
    params:
      root: "{{ input.working_directory }}"
      include_patterns: ["*.py", "*.yaml", "*.yml", "*.md", "*.toml", "*.json", "*.js", "*.ts", "*.rs"]
      signature_depth: "imports_and_exports"
    resolver:
      type: rule
      rules:
        - condition: "result.file_count > 0"
          transition: build_repomap
        - condition: "result.file_count == 0"
          transition: empty_project
    publishes:
      - project_manifest

  build_repomap:
    action: build_and_query_repomap
    description: "Build AST-based dependency map for intelligent file selection"
    params:
      root: "{{ input.working_directory | default('.') }}"
      include_patterns: ["*.py", "*.js", "*.ts", "*.rs"]
      max_chars: 3000
      focus_files: "{{ input.target_file_path | default('') }}"
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: check_research_needed
    publishes:
      - repo_map_formatted
      - related_files

  check_research_needed:
    action: noop
    description: "Determine if web research should supplement context — frustration-graduated with mechanical-failure guard"
    resolver:
      type: rule
      rules:
        # Mechanical failures — never research (file not found, path issues)
        - condition: >
            'file not found' in str(input.get('frustration_history', '')).lower()
            or 'does not exist' in str(input.get('frustration_history', '')).lower()
            or 'write_success == false' in str(input.get('frustration_history', '')).lower()
          transition: select_relevant
        # High frustration (6+): ALWAYS research before proceeding — mandatory
        - condition: "input.get('frustration_level', '0') in ('6', '7', '8', '9', '10')"
          transition: research
        # Medium frustration (3-5): research is strongly recommended — let LLM decide
        - condition: "input.get('frustration_level', '0') in ('3', '4', '5')"
          transition: decide_research_recommended
        # Low frustration (1-2): research is optional — let LLM decide
        - condition: "input.get('frustration_level', '0') in ('1', '2')"
          transition: decide_research_optional
        # No frustration (0): skip research entirely — save the inference call
        - condition: "true"
          transition: select_relevant

  decide_research_recommended:
    action: inference
    description: "LLM decides whether to research — frustration elevated"
    context:
      optional: [project_manifest, repo_map_formatted]
    prompt: |
      You are a context preparation module. A coding task has failed
      multiple times (frustration level: elevated).

      Task: {{ input.task_description }}
      {% if input.frustration_history %}
      Previous failures: {{ input.frustration_history }}
      {% endif %}

      Research can look up documentation, patterns, or solutions online.
      Given the repeated failures, would external research help?
    resolver:
      type: llm_menu
      prompt: "Should we research this problem externally?"
      options:
        research:
          description: "Yes — failures suggest missing knowledge"
        select_relevant:
          description: "No — issue is likely mechanical (wrong file, bad path)"
    publishes: []

  decide_research_optional:
    action: inference
    description: "LLM decides whether to research — first attempt, optional"
    context:
      optional: [project_manifest, repo_map_formatted]
    prompt: |
      You are a context preparation module. This is a first attempt
      at a coding task — research is optional but available.

      Task: {{ input.task_description }}
      {% if input.mission_objective %}
      Project objective: {{ input.mission_objective }}
      {% endif %}

      Would web research help with this specific task?
    resolver:
      type: llm_menu
      prompt: "Would web research help with this task?"
      options:
        research:
          description: "Yes — task involves unfamiliar APIs or patterns"
        select_relevant:
          description: "No — task is straightforward with available context"
    publishes: []

  research:
    action: flow
    description: "Fetch web research to help with repeated failures"
    flow: research_context
    input_map:
      problem_description: "{{ input.task_description }}"
      error_output: "{{ input.frustration_history }}"
      max_queries: "2"
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: select_relevant
    publishes:
      - research_findings

  select_relevant:
    action: select_relevant_files
    description: "Deterministically select relevant files via AST graph + heuristics (zero inference calls)"
    context:
      required: [project_manifest]
      optional: [repo_map_formatted, related_files, research_findings]
    params:
      target_file_path: "{{ input.target_file_path }}"
      task_description: "{{ input.task_description }}"
      context_budget: "{{ input.context_budget | default(10) }}"
    resolver:
      type: rule
      rules:
        - condition: "result.files_selected > 0"
          transition: load_selected
        - condition: "true"
          transition: load_fallback
    publishes:
      - selected_files

  load_selected:
    action: load_file_contents
    description: "Read full content of selected files (deterministic AST-based selection)"
    context:
      required: [selected_files, project_manifest]
      optional: [research_findings, related_files]
    params:
      budget: "{{ input.context_budget | default(8) }}"
      mission_objective: "{{ input.mission_objective | default('') }}"
    resolver:
      type: rule
      rules:
        - condition: "result.files_loaded > 0"
          transition: complete
        - condition: "true"
          transition: load_fallback
    publishes:
      - context_bundle

  load_fallback:
    action: load_file_contents
    description: "Fallback: load target file and immediate neighbors"
    context:
      optional: [project_manifest]
    params:
      strategy: "target_plus_neighbors"
      target: "{{ input.target_file_path }}"
      mission_objective: "{{ input.mission_objective | default('') }}"
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: complete
    publishes:
      - context_bundle

  empty_project:
    action: noop
    description: "No files exist yet — return empty context bundle"
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: complete
    publishes:
      - context_bundle

  complete:
    action: noop
    description: "Return curated context to caller"
    terminal: true
    status: success

entry: scan_workspace
