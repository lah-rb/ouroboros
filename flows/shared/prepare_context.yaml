flow: prepare_context
version: 1
description: >
  Sub-flow that scans the workspace, asks the model which files
  are relevant to a given task, and returns a curated context bundle.
  Integrates web research when frustration indicates repeated failures.

input:
  required:
    - working_directory
    - task_description
  optional:
    - mission_objective
    - target_file_path
    - frustration_history
    - frustration_level
    - context_budget
    - relevant_notes

defaults:
  config:
    temperature: "t*0.5"
    context_budget: 8

steps:

  scan_workspace:
    action: scan_project
    description: "Walk directory tree, extract file signatures"
    params:
      root: "{{ input.working_directory }}"
      include_patterns: ["*.py", "*.yaml", "*.yml", "*.md", "*.toml", "*.json", "*.js", "*.ts", "*.rs"]
      signature_depth: "imports_and_exports"
    resolver:
      type: rule
      rules:
        - condition: "result.file_count > 0"
          transition: check_research_needed
        - condition: "result.file_count == 0"
          transition: empty_project
    publishes:
      - project_manifest

  check_research_needed:
    action: noop
    description: "Determine if web research should supplement context — always available, frustration-graduated"
    resolver:
      type: rule
      rules:
        # High frustration (6+): ALWAYS research before proceeding — mandatory
        - condition: "input.get('frustration_level', '0') in ('6', '7', '8', '9', '10')"
          transition: research
        # Medium frustration (3-5): research is strongly recommended — let LLM decide
        - condition: "input.get('frustration_level', '0') in ('3', '4', '5')"
          transition: decide_research_recommended
        # Low/no frustration: research is optional — let LLM decide
        - condition: "true"
          transition: decide_research_optional

  decide_research_recommended:
    action: inference
    description: "LLM decides whether to research — research is RECOMMENDED at this frustration level"
    context:
      required: [project_manifest]
    prompt: |
      You are deciding whether web research would help with a coding task.
      Previous attempts have FAILED. Research is STRONGLY RECOMMENDED.

      Task: {{ input.task_description }}
      {% if input.frustration_history %}
      Previous failures: {{ input.frustration_history }}
      {% endif %}

      Should we search the web for solutions before proceeding?
      Answer with ONLY "yes" or "no".
    config:
      temperature: 0.1
      max_tokens: 8
    resolver:
      type: rule
      rules:
        - condition: "'yes' in result.text.lower()"
          transition: research
        - condition: "true"
          transition: select_relevant
    publishes:
      - inference_response

  decide_research_optional:
    action: inference
    description: "LLM decides whether to research — research is available but optional"
    context:
      required: [project_manifest]
    prompt: |
      You are deciding whether web research would help with a coding task.
      This is a first attempt — research is optional but available.

      Task: {{ input.task_description }}
      {% if input.mission_objective %}
      Project objective: {{ input.mission_objective }}
      {% endif %}

      Would web research help with this specific task?
      Answer with ONLY "yes" or "no".
    config:
      temperature: 0.1
      max_tokens: 8
    resolver:
      type: rule
      rules:
        - condition: "'yes' in result.text.lower()"
          transition: research
        - condition: "true"
          transition: select_relevant
    publishes:
      - inference_response

  research:
    action: flow
    description: "Fetch web research to help with repeated failures"
    flow: research_context
    input_map:
      problem_description: "{{ input.task_description }}"
      error_output: "{{ input.frustration_history }}"
      max_queries: "2"
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: select_relevant
    publishes:
      - research_findings

  select_relevant:
    action: inference
    description: "LLM decides which files matter for this task"
    context:
      required: [project_manifest]
      optional: [research_findings]
    prompt: |
      You are a context selection module in an automated coding pipeline.
      Your output will be parsed by a JSON extractor. Return ONLY a raw JSON
      array — no markdown, no explanation, no surrounding text.

      Task: {{ input.task_description }}
      {% if input.mission_objective %}
      Project objective: {{ input.mission_objective }}
      {% endif %}
      {% if input.target_file_path %}
      Primary target file: {{ input.target_file_path }}
      {% endif %}

      Available files in the project:
      {% for filepath, sig in context.project_manifest.items() %}
      --- {{ filepath }} ---
      {{ sig }}
      {% endfor %}

      {% if input.relevant_notes %}
      Relevant notes from previous work:
      {{ input.relevant_notes }}
      {% endif %}

      {% if context.research_findings %}
      Research findings (from web search due to previous failures):
      {{ context.research_findings }}
      {% endif %}

      {% if input.frustration_history %}
      ⚠️ Previous attempts at this task FAILED:
      {{ input.frustration_history }}
      Consider what additional context might prevent the same failure.
      {% endif %}

      Select the files this task needs to see. Budget: at most {{ input.context_budget | default(8) }} files.
      Prioritize: target file (if any), direct imports/dependencies, interfaces
      the target depends on, test files if modifying code.

      ✅ CORRECT output (raw JSON array, nothing else):
      [
        {"file": "src/models.py", "reason": "defines data classes used by target", "priority": 1},
        {"file": "tests/test_models.py", "reason": "tests for the module being modified", "priority": 2}
      ]

      ❌ WRONG — do not wrap in markdown:
      ```json
      [{"file": "src/models.py", "reason": "needed", "priority": 1}]
      ```

      ❌ WRONG — do not add explanation:
      Based on the task, these files are relevant:
      [{"file": "src/models.py"}]

      Return ONLY the raw JSON array.
    config:
      temperature: 0.1
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: load_selected
        - condition: "true"
          transition: load_fallback
    publishes:
      - inference_response

  load_selected:
    action: load_file_contents
    description: "Read full content of LLM-selected files"
    context:
      required: [inference_response, project_manifest]
      optional: [research_findings]
    params:
      budget: "{{ input.context_budget | default(8) }}"
    resolver:
      type: rule
      rules:
        - condition: "result.files_loaded > 0"
          transition: complete
        - condition: "true"
          transition: load_fallback
    publishes:
      - context_bundle

  load_fallback:
    action: load_file_contents
    description: "Fallback: load target file and immediate neighbors"
    context:
      optional: [project_manifest]
    params:
      strategy: "target_plus_neighbors"
      target: "{{ input.target_file_path }}"
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: complete
    publishes:
      - context_bundle

  empty_project:
    action: noop
    description: "No files exist yet — return empty context bundle"
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: complete
    publishes:
      - context_bundle

  complete:
    action: noop
    description: "Return curated context to caller"
    terminal: true
    status: success

entry: scan_workspace
