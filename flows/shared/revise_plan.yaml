flow: revise_plan
version: 1
description: >
  Revise the mission plan based on new observations.
  Can add tasks, reorder priorities, or mark tasks obsoleted.
  Writes changes to persistence; mission_control picks them up.

input:
  required:
    - mission_id
    - observation
  optional:
    - discovered_requirement
    - affected_task_id

defaults:
  config:
    temperature: "t*1.1"

steps:

  load_current_plan:
    action: load_mission_state
    description: "Load current mission state to see existing plan"
    resolver:
      type: rule
      rules:
        - condition: "result.mission.status == 'active'"
          transition: evaluate_revision
        - condition: "true"
          transition: skip
    publishes:
      - mission

  evaluate_revision:
    action: inference
    description: "Determine what plan changes are needed"
    context:
      required: [mission]
    prompt: |
      You are a plan revision module in an automated coding pipeline.
      Your output will be parsed by a JSON extractor. Return ONLY a raw JSON
      object — no markdown, no explanation, no surrounding text.

      Mission objective: {{ context.mission.objective }}

      Current plan:
      {% for task in context.mission.plan %}
      - [{{ task.status }}] {{ task.id }}: {{ task.description }}
        Flow: {{ task.flow }} | Priority: {{ task.priority }}
        {% if task.summary %}Result: {{ task.summary }}{% endif %}
      {% endfor %}

      New observation: {{ input.observation }}
      {% if input.discovered_requirement %}
      Discovered requirement: {{ input.discovered_requirement }}
      {% endif %}

      Evaluate whether the plan needs revision based on this new information.

      ✅ CORRECT output (raw JSON object, nothing else):
      {
        "revision_needed": true,
        "reasoning": "The new module requires a configuration file that wasn't planned",
        "add_tasks": [
          {
            "description": "Create configuration schema for the new module",
            "flow": "create_file",
            "priority": 2,
            "inputs": {"target_file_path": "config/schema.py", "reason": "needed by new module"},
            "depends_on": []
          }
        ],
        "reprioritize": [],
        "obsolete": []
      }

      ❌ WRONG — do not wrap in markdown:
      ```json
      {"revision_needed": true, ...}
      ```

      ❌ WRONG — do not add explanation:
      Based on the observation, here are the changes:
      {"revision_needed": true, ...}

      Rules:
      - Do NOT modify completed or in_progress tasks.
      - New tasks must specify "flow" as "create_file" or "modify_file".
      - Dependencies must reference existing task IDs.
      - Only mark tasks obsolete if the observation genuinely invalidates them.
      - If no revision is needed, set "revision_needed" to false with empty arrays.

      Return ONLY the raw JSON object.
    config:
      temperature: 0.3
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: apply_revision
        - condition: "true"
          transition: skip
    publishes:
      - inference_response

  apply_revision:
    action: apply_plan_revision
    description: "Apply the revision to mission state"
    context:
      required: [mission, inference_response]
    resolver:
      type: rule
      rules:
        - condition: "result.revision_applied == true"
          transition: complete
        - condition: "true"
          transition: skip
    publishes:
      - mission

  skip:
    action: noop
    description: "No revision needed or possible"
    terminal: true
    status: success

  complete:
    action: noop
    description: "Plan revised successfully"
    terminal: true
    status: success

entry: load_current_plan
