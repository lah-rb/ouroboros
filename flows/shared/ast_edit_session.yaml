flow: ast_edit_session
version: 1
description: >
  Memoryful AST-aware editing session. Receives a parsed symbol table
  and file content, presents symbols as a constrained menu for progressive
  selection, then rewrites each selected symbol sequentially in a
  memoryful inference session. Each rewrite sees the result of prior
  rewrites. Returns the modified file written to disk.

input:
  required:
    - file_path
    - file_content
    - symbol_table
    - symbol_menu_options
    - task_description
  optional:
    - reason
    - mode  # "fix" or "refactor"
    - relevant_notes
    - working_directory

defaults:
  config:
    temperature: "t*0.6"

steps:

  # ── Phase 1: Start memoryful session ────────────────────────

  start_session:
    action: start_edit_session
    description: "Open memoryful inference session for symbol selection and rewriting"
    resolver:
      type: rule
      rules:
        - condition: "result.session_started == true"
          transition: select_symbols
        - condition: "true"
          transition: session_failed
    publishes:
      - edit_session_id
      - file_content
      - file_path
      - mode

  # ── Phase 2: Progressive symbol selection ───────────────────
  #    Uses memoryful session. Each turn presents the menu with
  #    current selections. Model picks one symbol per turn.
  #    Empty response = selection complete.

  select_symbols:
    action: select_symbol_turn
    description: "Present symbol menu, model picks next target or signals done"
    context:
      required: [edit_session_id, symbol_menu_options]
      optional: [selected_symbols, selection_turn]
    resolver:
      type: rule
      rules:
        - condition: "result.selection_complete == true and result.symbols_selected > 0"
          transition: begin_rewrites
        - condition: "result.selection_complete == true and result.symbols_selected == 0"
          transition: no_changes_needed
        - condition: "result.full_rewrite_requested == true"
          transition: close_full_rewrite
        - condition: "result.symbol_selected == true"
          transition: select_symbols
        - condition: "true"
          transition: begin_rewrites
    publishes:
      - selected_symbols
      - selection_turn

  # ── Phase 3: Sequential rewrite loop ────────────────────────
  #    For each selected symbol, present its body + context,
  #    model produces complete rewritten body, runtime splices it.

  begin_rewrites:
    action: prepare_next_rewrite
    description: "Queue selected symbols for sequential rewriting"
    context:
      required: [selected_symbols, symbol_table]
    resolver:
      type: rule
      rules:
        - condition: "result.has_next == true"
          transition: rewrite_symbol
        - condition: "true"
          transition: finalize
    publishes:
      - rewrite_queue
      - current_symbol

  rewrite_symbol:
    action: rewrite_symbol_turn
    description: "Present current symbol body — model produces complete rewritten version"
    context:
      required: [edit_session_id, current_symbol]
      optional: [rewrite_queue, file_content, file_content_updated, file_path, mode]
    resolver:
      type: rule
      rules:
        - condition: "result.rewrite_success == true and result.has_next == true"
          transition: rewrite_symbol
        - condition: "result.rewrite_success == true"
          transition: finalize
        - condition: "true"
          transition: finalize
    publishes:
      - current_symbol
      - rewrite_queue
      - file_content_updated

  # ── Phase 4: Write and close ────────────────────────────────

  finalize:
    action: finalize_edit_session
    description: "Write modified file to disk and close inference session"
    context:
      required: [edit_session_id]
      optional: [file_content_updated, selected_symbols, file_path]
    terminal: true
    status: success
    publishes:
      - files_changed
      - edit_summary

  no_changes_needed:
    action: close_edit_session
    description: "Model determined no symbol changes needed"
    context:
      required: [edit_session_id]
    params:
      return_status: "success"
    terminal: true
    status: success
    publishes:
      - edit_summary

  close_full_rewrite:
    action: close_edit_session
    description: "Model requested full file rewrite instead of symbol editing"
    context:
      required: [edit_session_id]
    params:
      return_status: "full_rewrite_requested"
    terminal: true
    status: full_rewrite_requested

  session_failed:
    action: noop
    description: "Could not start edit session"
    terminal: true
    status: failed

entry: start_session
