flow: research_context
version: 2
description: >
  Research dispatcher — classifies a research query and routes to
  the most appropriate research strategy. Supports web search (default),
  codebase structure analysis (repomap), git history investigation,
  and technical literature search. Interface to callers is unchanged
  from v1 — same inputs, same published outputs.

input:
  required:
    - problem_description
  optional:
    - error_output
    - search_hints
    - max_queries
    - working_directory
    - target_file_path
    - research_type_hint

defaults:
  config:
    temperature: "t*0.3"

steps:

  classify_query:
    action: noop
    description: "Fast-path when research type is already known"
    resolver:
      type: rule
      rules:
        - condition: "input.get('research_type_hint', '') == 'web_search'"
          transition: formulate_query
        - condition: "input.get('research_type_hint', '') == 'codebase_structure'"
          transition: route_repomap
        - condition: "input.get('research_type_hint', '') == 'codebase_history'"
          transition: route_history
        - condition: "input.get('research_type_hint', '') == 'technical_docs'"
          transition: route_technical
        - condition: "true"
          transition: classify_query_menu

  classify_query_menu:
    action: inference
    description: "LLM classifies research query"
    prompt: |
      You are a research routing module. Classify this research need:

      Problem: {{ input.problem_description }}
      {% if input.error_output %}Error: {{ input.error_output[:500] }}{% endif %}
    resolver:
      type: llm_menu
      prompt: "What type of research is needed?"
      options:
        formulate_query:
          description: "Web search — documentation, tutorials, solutions"
        route_repomap:
          description: "Codebase structure — file relationships, dependencies"
        route_history:
          description: "Code history — git history for change context"
        route_technical:
          description: "Technical docs — authoritative APIs or specs"
    publishes:
      - query_classification

  # ── Web Search Path (v1 inline, default) ────────────────────────

  formulate_query:
    action: inference
    description: "Turn the problem into effective search queries"
    prompt: |
      You are a search query formulation module in an automated coding pipeline.
      Your output will be parsed by a JSON extractor. Return ONLY a raw JSON
      array of query strings — no markdown, no explanation, no surrounding text.

      Problem: {{ input.problem_description }}
      {% if input.error_output %}
      Error output:
      {{ input.error_output }}
      {% endif %}
      {% if input.search_hints %}
      Hints: {{ input.search_hints }}
      {% endif %}

      Formulate 1-3 focused search queries that would help solve this problem.

      Good queries: specific error messages, library API references, known issue patterns.
      Bad queries: generic tutorials, broad topic overviews, single-word searches.

      ✅ CORRECT output (raw JSON array, nothing else):
      ["python asyncio.gather timeout handling", "httpx ConnectError retry pattern"]

      ❌ WRONG — do not wrap in markdown:
      ```json
      ["python asyncio"]
      ```

      ❌ WRONG — do not add explanation:
      Here are some queries to try:
      ["python asyncio"]

      Return ONLY the raw JSON array of query strings.
    config:
      temperature: 0.2
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: parse_queries
        - condition: "true"
          transition: empty_result
    publishes:
      - inference_response

  parse_queries:
    action: extract_search_queries
    description: "Parse JSON array from inference response into search_queries"
    context:
      required: [inference_response]
    params:
      max_queries: "{{ input.max_queries | default(3) }}"
    resolver:
      type: rule
      rules:
        - condition: "result.query_count > 0"
          transition: execute_search
        - condition: "true"
          transition: empty_result
    publishes:
      - search_queries

  execute_search:
    action: curl_search
    description: "Execute search queries via curl"
    context:
      required: [search_queries]
    params:
      max_queries: "{{ input.max_queries | default(2) }}"
      timeout: 15
    resolver:
      type: rule
      rules:
        - condition: "result.results_found > 0"
          transition: extract_relevant
        - condition: "true"
          transition: empty_result
    publishes:
      - raw_search_results

  extract_relevant:
    action: inference
    description: "Extract actionable information from search results"
    context:
      required: [raw_search_results]
    prompt: |
      You are an information extraction module in an automated coding pipeline.
      Your output will be stored as context for a code generation task.
      Extract ONLY facts directly useful for solving the problem — no opinions,
      no summaries of what you searched for.

      Problem being solved:
      {{ input.problem_description }}

      Search results:
      {% for result in context.raw_search_results %}
      --- Source: {{ result.url }} ---
      {{ result.content[:2000] }}
      {% endfor %}

      Extract actionable information: code patterns, API signatures,
      configuration values, known fixes, version-specific behavior.

      If nothing useful was found, respond with exactly: "No relevant results found."

      Write concise, factual findings as plain prose. Do NOT use headers or
      bullet points. Do NOT restate the problem description.

      Return ONLY the extracted findings.
    config:
      temperature: 0.1
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: complete
        - condition: "true"
          transition: empty_result
    publishes:
      - research_findings

  # ── Repomap Path (codebase structure) ───────────────────────────

  route_repomap:
    action: flow
    description: "Analyze codebase structure via AST-based repo map"
    flow: research_repomap
    input_map:
      research_query: "{{ input.problem_description }}"
      working_directory: "{{ input.working_directory }}"
      target_file_path: "{{ input.target_file_path }}"
    resolver:
      type: rule
      rules:
        - condition: "result.status == 'success'"
          transition: synthesize_subflow
        - condition: "true"
          transition: formulate_query
    publishes:
      - raw_results

  # ── Git History Path ────────────────────────────────────────────

  route_history:
    action: flow
    description: "Investigate code history via git"
    flow: research_codebase_history
    input_map:
      research_query: "{{ input.problem_description }}"
      working_directory: "{{ input.working_directory }}"
      target_file: "{{ input.target_file_path }}"
    resolver:
      type: rule
      rules:
        - condition: "result.status == 'success'"
          transition: synthesize_subflow
        - condition: "true"
          transition: formulate_query
    publishes:
      - raw_results

  # ── Technical Docs Path ─────────────────────────────────────────

  route_technical:
    action: flow
    description: "Search authoritative technical sources"
    flow: research_technical
    input_map:
      research_query: "{{ input.problem_description }}"
    resolver:
      type: rule
      rules:
        - condition: "result.status == 'success'"
          transition: synthesize_subflow
        - condition: "true"
          transition: formulate_query
    publishes:
      - raw_results

  # ── Synthesis (for sub-flow paths) ──────────────────────────────

  synthesize_subflow:
    action: inference
    description: "Synthesize sub-flow research results into actionable findings"
    context:
      required: [raw_results]
      optional: [query_classification]
    prompt: |
      You researched this question:
      {{ input.problem_description }}

      ## Research Results
      {{ context.raw_results }}

      Produce a concise, actionable answer:
      1. **Direct answer**: address the research question specifically
      2. **Key findings**: the most relevant information discovered
      3. **Confidence**: how reliable is this information
      4. **Caveats**: anything to be cautious about

      Write concise, factual findings as plain prose. Do NOT use headers or
      bullet points. Do NOT restate the problem description.

      Return ONLY the extracted findings.
    config:
      temperature: "t*0.3"
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: complete
        - condition: "true"
          transition: empty_result
    publishes:
      - research_findings

  # ── Terminal States ─────────────────────────────────────────────

  empty_result:
    action: noop
    description: "No useful research results"
    terminal: true
    status: success

  complete:
    action: noop
    description: "Research complete"
    terminal: true
    status: success

entry: classify_query
