flow: validate_output
version: 3
description: >
  Validate a created or modified file with three tiers:
  1. Syntax/compile check (required — blocks on failure)
  2. Execution/import check (non-blocking — flags issues for correction)
  3. Lint check (non-blocking — warnings logged as notes for fixing)
  The LLM determines language-appropriate commands for each tier.

  Three possible outcomes:
  - success: all checks pass
  - issues: syntax passes but execution/lint checks have problems (file is usable, needs fixing)
  - failed: syntax check fails (file is broken)

input:
  required:
    - file_path
    - working_directory
  optional:
    - project_manifest
    - validation_hint
    - relevant_notes
    - test_path
    - max_attempts

defaults:
  config:
    temperature: "t*0.4"

steps:

  check_file_type:
    action: noop
    description: "Quick file type check — skip LLM validation for non-code files"
    resolver:
      type: rule
      rules:
        - condition: >
            input.get('file_path', '').endswith('.md')
            or input.get('file_path', '').endswith('.txt')
            or input.get('file_path', '').endswith('.json')
            or input.get('file_path', '').endswith('.toml')
            or input.get('file_path', '').endswith('.cfg')
            or input.get('file_path', '').endswith('.ini')
            or input.get('file_path', '').endswith('.env')
            or input.get('file_path', '').endswith('.csv')
          transition: complete_pass
        - condition: "true"
          transition: determine_strategy
    publishes:
      - validation_results

  determine_strategy:
    action: inference
    description: "LLM decides what validation to run across all three tiers"
    context:
      optional: [project_manifest]
    prompt: |
      You are a validation strategy module in an automated coding pipeline.
      Your output will be parsed by a JSON extractor. Return ONLY a raw JSON
      object — no markdown, no explanation, no surrounding text.

      A file was just created or modified and needs validation.
      File: {{ input.file_path }}
      Working directory: {{ input.working_directory }}
      {% if input.validation_hint %}
      Suggested approach: {{ input.validation_hint }}
      {% endif %}

      {% if context.project_manifest %}
      Project files:
      {% for filepath in context.project_manifest.keys() %}
      - {{ filepath }}
      {% endfor %}
      {% endif %}

      You MUST provide checks for THREE validation tiers:

      Tier 1 — SYNTAX (required: true): Does the file parse/compile?
        Python: py_compile  |  JS/TS: node --check  |  Rust: cargo check  |  YAML: python -c "import yaml; yaml.safe_load(open(...))"

      Tier 2 — EXECUTION (required: false): Do imports/references resolve? Can the file be loaded?
        This is NON-BLOCKING because dependencies may not exist yet.
        Python: python -c "import {module_name}" (convert file path to module: app/main.py → app.main)
        JS/TS: node -e "require('./{file}')"  |  Rust: cargo build

      Tier 3 — LINT (required: false): Code quality warnings (non-blocking).
        Python: ruff check {file} OR flake8 {file} OR pylint {file}
        JS/TS: eslint {file}  |  Rust: cargo clippy
        Use whatever linter is likely available or standard for the language.
        If unsure, use the most common/lightweight option.

      Tier 4 — TESTS (required: false): Run tests ONLY if test files are visible in the project files listing above.
        If NO tests/ directory or test_*.py files appear in the project files, DO NOT include a test check at all.
        Python: uv run pytest tests/ -v --tb=short  |  JS: npm test  |  Rust: cargo test

      ✅ CORRECT output (raw JSON object, nothing else):
      {
        "language": "python",
        "checks": [
          {
            "name": "syntax check",
            "command": ["python", "-c", "import py_compile; py_compile.compile('app/main.py', doraise=True)"],
            "timeout": 30,
            "required": true,
            "tier": "syntax"
          },
          {
            "name": "import check",
            "command": ["python", "-c", "import app.main"],
            "timeout": 30,
            "required": false,
            "tier": "execution"
          },
          {
            "name": "lint",
            "command": ["ruff", "check", "app/main.py"],
            "timeout": 30,
            "required": false,
            "tier": "lint"
          },
          {
            "name": "run tests",
            "command": ["uv", "run", "pytest", "tests/", "-v", "--tb=short"],
            "timeout": 120,
            "required": false,
            "tier": "test"
          }
        ]
      }

      ❌ WRONG — do not wrap in markdown:
      ```json
      {"language": "python", "checks": [...]}
      ```

      ❌ WRONG — do not add explanation:
      Here is the validation strategy:
      {"language": "python", "checks": [...]}

      {% if input.relevant_notes %}
      ⚠️ Notes from previous work (IMPORTANT — adjust strategy to avoid past mistakes):
      {{ input.relevant_notes }}
      {% endif %}

      Rules:
      - You MUST include at least one syntax check (required: true).
      - Execution/import checks are always required: false (non-blocking — dependencies may not exist yet).
      - Lint checks are always required: false (warnings only).
      - Test checks are required: false (only if test files visible in project).
      - For Python import checks: convert file path to module name (app/main.py → app.main, src/utils/helpers.py → src.utils.helpers).
      - Keep timeouts reasonable (30s for syntax/import/lint, 120s for tests).
      - Use paths relative to the working directory.

      Return ONLY the raw JSON object.
    config:
      temperature: 0.0
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: execute_checks
        - condition: "true"
          transition: fallback_check
    publishes:
      - inference_response

  execute_checks:
    action: run_validation_checks
    description: "Execute all validation tiers — syntax, execution, lint, tests"
    context:
      required: [inference_response]
    params:
      max_checks: 8
      log_lint_as_notes: true
    resolver:
      type: rule
      rules:
        - condition: "result.all_required_passing == true"
          transition: log_lint_warnings
        - condition: "result.all_required_passing == false"
          transition: complete_fail
    publishes:
      - validation_results

  log_lint_warnings:
    action: log_validation_notes
    description: "Capture execution/lint warnings as mission notes for correction"
    context:
      required: [validation_results]
    resolver:
      type: rule
      rules:
        - condition: "result.notes_logged > 0"
          transition: complete_with_issues
        - condition: "true"
          transition: complete_pass
    publishes:
      - lint_notes_saved

  fallback_check:
    action: run_fallback_validation
    description: "Fallback: syntax + import check without LLM strategy"
    params:
      file_path: "{{ input.file_path }}"
    resolver:
      type: rule
      rules:
        - condition: "result.all_required_passing == true"
          transition: complete_pass
        - condition: "true"
          transition: complete_fail
    publishes:
      - validation_results

  complete_pass:
    action: noop
    description: "Validation passed — all checks clean"
    terminal: true
    status: success

  complete_with_issues:
    action: noop
    description: "Syntax passed but execution/lint issues need correction"
    terminal: true
    status: issues

  complete_fail:
    action: noop
    description: "Validation failed — syntax errors"
    terminal: true
    status: failed

entry: check_file_type
