flow: quality_gate
version: 3
description: >
  Project-wide quality validation. Three-phase gate:
  1. Deterministic checks — file scan, cross-file AST consistency, import validation, lint
  2. Behavioral validation — sub-flow to run_in_terminal, actually execute the project
  3. Summary — LLM reviews all results and determines pass/fail

  Receives clean context: working_directory and mission_objective.
  Judges the product, not the process that built it.

  Modes:
  - "completion" (default): Final gate before declaring mission complete.
  - "checkpoint": Mid-mission inspection. Terminal execution skipped.

input:
  required:
    - working_directory
    - mission_id
  optional:
    - mission_objective
    - relevant_notes
    - architecture_run_command
    - architecture_import_scheme
    - architecture_modules
    - mode  # "checkpoint" or "completion", default "completion"

defaults:
  config:
    temperature: 0.1

steps:

  # ── Phase 1: Deterministic checks ──────────────────────────

  scan_project:
    action: scan_project
    description: "Discover all source files in the project"
    params:
      root: "."
    resolver:
      type: rule
      rules:
        - condition: "result.file_count > 0"
          transition: cross_file_check
        - condition: "true"
          transition: pass_empty
    publishes:
      - project_manifest

  cross_file_check:
    action: validate_cross_file_consistency
    description: "Deterministic AST-based cross-file consistency check (no LLM needed)"
    params:
      root: "."
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: plan_checks
    publishes:
      - cross_file_results
      - cross_file_summary

  plan_checks:
    action: inference
    description: "LLM plans deterministic validation checks (imports, lint)"
    context:
      required: [project_manifest]
      optional: [cross_file_summary]
    prompt: |
      You are a project quality gate in an automated coding pipeline.
      Your output will be parsed by a JSON extractor. Return ONLY a raw JSON
      object — no markdown, no explanation, no surrounding text.

      Working directory: {{ input.working_directory }}

      Project files:
      {% for filepath, sig in context.project_manifest.items() %}
      - {{ filepath }}
        {{ sig[:120] }}
      {% endfor %}

      Plan validation checks that verify the project structure:

      1. IMPORT CHECKS: For each Python module, verify it can be imported.
         Convert file paths to module names (app/main.py → app.main).
         Skip __init__.py files.

      2. CROSS-MODULE CHECK: For the main/entry module, test that its key imports
         actually resolve at runtime:
         ["python", "-c", "from main import main; print('OK')"]

      3. LINT: Run ruff or python -m py_compile on each source file.

      Mark ALL checks as required: false — collect ALL issues, don't stop early.

      ✅ CORRECT output (raw JSON object, nothing else):
      {
        "language": "python",
        "checks": [
          {
            "name": "import models",
            "command": ["python", "-c", "import models"],
            "timeout": 30,
            "required": false,
            "tier": "execution"
          }
        ]
      }

      Rules:
      - ALL checks must be required: false.
      - Include an import check for EVERY .py file (except __init__.py).
      - Do NOT include full application execution here — that happens separately.
      - Return ONLY the raw JSON object.
    config:
      temperature: 0.0
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: execute_checks
        - condition: "true"
          transition: check_mode_for_terminal
    publishes:
      - inference_response

  execute_checks:
    action: run_validation_checks
    description: "Execute all deterministic quality checks"
    context:
      required: [inference_response]
    params:
      max_checks: 20
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: check_mode_for_terminal
    publishes:
      - validation_results

  # ── Phase 2: Behavioral validation (completion mode only) ───

  check_mode_for_terminal:
    action: noop
    description: "Route based on mode — completion runs terminal, checkpoint skips"
    resolver:
      type: rule
      rules:
        - condition: "input.get('mode', 'completion') == 'completion'"
          transition: run_behavioral_check
        - condition: "true"
          transition: summarize

  run_behavioral_check:
    action: flow
    description: "Execute the project in a terminal session and verify it works"
    flow: run_in_terminal
    input_map:
      session_goal: >-
        Run the project and verify it works correctly.
        Mission objective: {{ input.mission_objective or 'verify the project runs without errors' }}.
        {% if input.architecture_run_command %}
        Architecture: Run command: {{ input.architecture_run_command }}.
        Import scheme: {{ input.architecture_import_scheme }}.
        Modules: {{ input.architecture_modules }}.
        {% endif %}
        Execute the main entry point, observe output, try basic interactions if applicable.
        Report whether the software functions as intended.
      working_directory: "{{ input.working_directory }}"
      initial_commands: ""
    resolver:
      type: rule
      rules:
        - condition: "result.status == 'success'"
          transition: summarize
        - condition: "true"
          transition: summarize
    publishes:
      - terminal_output
      - terminal_status

  # ── Phase 3: Summary and verdict ───────────────────────────

  summarize:
    action: inference
    description: "Summarize all quality results into actionable findings"
    context:
      optional: [validation_results, project_manifest, cross_file_summary, terminal_output, terminal_status]
    prompt: |
      You are a quality assessment module in an automated coding pipeline.
      Your output will be parsed by a JSON extractor. Return ONLY a raw JSON
      object — no markdown, no explanation, no surrounding text.

      {% if input.get('mode', 'completion') == 'checkpoint' %}
      MODE: Checkpoint — report on current health. Issues found here will
      be used to expand the mission plan with fix tasks.
      {% else %}
      MODE: Completion — this is the final gate. The project must be
      structurally sound AND behaviorally correct to pass.
      {% endif %}

      Mission objective: {{ input.mission_objective or 'not specified' }}

      ## Files in Project
      {% if context.project_manifest %}
      {% for filepath in context.project_manifest.keys() %}
      - {{ filepath }}
      {% endfor %}
      {% else %}
      No project manifest available.
      {% endif %}

      {% if context.cross_file_summary %}
      ## Structural Analysis (AST-based)
      {{ context.cross_file_summary }}
      {% endif %}

      {% if context.validation_results %}
      ## Deterministic Check Results
      {% for check in context.validation_results %}
      - {{ check.name }}: {{ "PASS" if check.passed else "FAIL" }}
        {% if not check.passed %}
        stdout: {{ check.stdout[:200] }}
        stderr: {{ check.stderr[:200] }}
        {% endif %}
      {% endfor %}
      {% endif %}

      {% if context.terminal_output %}
      ## Behavioral Validation (Terminal Execution)
      {{ context.terminal_output[:1000] }}
      {% elif input.get('mode', 'completion') == 'completion' %}
      ## Behavioral Validation
      Terminal execution was not performed or produced no output.
      {% endif %}

      Produce a verdict:

      ✅ CORRECT output:
      {
        "all_passing": false,
        "structural_ok": true,
        "behavioral_ok": false,
        "total_checks": 6,
        "passed": 4,
        "failed": 2,
        "summary": "Imports OK but main.py crashes on startup with ValueError",
        "fix_tasks": [
          {
            "description": "Fix engine.py — constructor validation prevents startup",
            "file": "engine.py",
            "issue": "GameEngine.__post_init__ raises ValueError before world data is loaded"
          }
        ]
      }

      If all checks pass AND behavioral validation succeeded:
      {"all_passing": true, "structural_ok": true, "behavioral_ok": true, "total_checks": 6, "passed": 6, "failed": 0, "summary": "All quality checks pass — project is functional", "fix_tasks": []}

      Rules:
      - ONLY create fix_tasks for files that exist in the project.
      - Each fix_task targets exactly one file.
      - Do NOT include a "flow" field — the director chooses the approach.
      - Limit to at most 5 fix_tasks. Consolidate related issues.
      - For completion mode: both structural AND behavioral must pass for all_passing=true.
      - Return ONLY the raw JSON object.
    config:
      temperature: 0.1
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: evaluate_results
        - condition: "true"
          transition: pass_empty
    publishes:
      - inference_response

  evaluate_results:
    action: apply_quality_gate_results
    description: "Parse quality summary and determine pass/fail"
    context:
      required: [inference_response]
      optional: [validation_results, project_manifest]
    resolver:
      type: rule
      rules:
        - condition: "result.all_passing == true"
          transition: gate_pass
        - condition: "result.all_passing == false"
          transition: gate_fail
        - condition: "true"
          transition: gate_pass
    publishes:
      - quality_results

  # ── Terminal states ────────────────────────────────────────

  gate_pass:
    action: noop
    description: "Project passes quality gate"
    terminal: true
    status: success

  gate_fail:
    action: noop
    description: "Project has quality issues needing attention"
    terminal: true
    status: failed

  pass_empty:
    action: noop
    description: "No files to check or could not plan checks"
    terminal: true
    status: success

entry: scan_project
