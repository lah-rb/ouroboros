flow: quality_gate
version: 1
description: >
  End-of-mission quality gate. Runs after all tasks are complete.
  Scans the project, uses LLM to plan comprehensive validation checks
  (imports, tests, integration), executes them, and reports results.
  If issues are found, returns with details so mission_control can
  create fix tasks via revise_plan.

input:
  required:
    - working_directory
    - mission_id
  optional:
    - mission_objective

defaults:
  config:
    temperature: 0.0

steps:

  scan_project:
    action: scan_project
    description: "Discover all source files in the project"
    params:
      root: "."
    resolver:
      type: rule
      rules:
        - condition: "result.file_count > 0"
          transition: plan_checks
        - condition: "true"
          transition: pass_empty
    publishes:
      - project_manifest

  plan_checks:
    action: inference
    description: "LLM plans comprehensive project-wide validation"
    context:
      required: [project_manifest]
    prompt: |
      You are a project quality gate in an automated coding pipeline.
      Your output will be parsed by a JSON extractor. Return ONLY a raw JSON
      object — no markdown, no explanation, no surrounding text.

      All individual tasks are complete. Now validate the ENTIRE project works together.
      Working directory: {{ input.working_directory }}

      Project files:
      {% for filepath, sig in context.project_manifest.items() %}
      - {{ filepath }}
        {{ sig[:120] }}
      {% endfor %}

      Plan validation checks that verify the project as a whole:

      1. IMPORT CHECKS: For each Python module, verify it can be imported.
         Convert file paths to module names (app/main.py → app.main).
         Skip __init__.py files.

      2. INTEGRATION CHECK: Run the main entry point (if one exists) with --help or minimal args.

      3. TEST SUITE: Run pytest if tests/ directory exists.

      4. LINT: Run ruff or flake8 on the entire project.

      Mark ALL checks as required: false — we want to collect ALL issues, not stop at the first.

      ✅ CORRECT output (raw JSON object, nothing else):
      {
        "language": "python",
        "checks": [
          {
            "name": "import models/data",
            "command": ["python", "-c", "import models.data"],
            "timeout": 30,
            "required": false,
            "tier": "execution"
          },
          {
            "name": "import app",
            "command": ["python", "-c", "import app"],
            "timeout": 30,
            "required": false,
            "tier": "execution"
          },
          {
            "name": "lint all",
            "command": ["ruff", "check", "."],
            "timeout": 60,
            "required": false,
            "tier": "lint"
          },
          {
            "name": "run tests",
            "command": ["python", "-m", "pytest", "tests/", "-v", "--tb=short"],
            "timeout": 120,
            "required": false,
            "tier": "test"
          }
        ]
      }

      ❌ WRONG — do not wrap in markdown or add explanation.

      Rules:
      - ALL checks must be required: false — collect everything, don't stop early.
      - Include an import check for EVERY .py file (except __init__.py).
      - Convert file paths to module names (slashes → dots, strip .py).
      - Include tests only if test files exist in the manifest.
      - Include lint if any source files exist.

      Return ONLY the raw JSON object.
    config:
      temperature: 0.0
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: execute_checks
        - condition: "true"
          transition: pass_empty
    publishes:
      - inference_response

  execute_checks:
    action: run_validation_checks
    description: "Execute all project-wide quality checks"
    context:
      required: [inference_response]
    params:
      max_checks: 20
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: summarize
    publishes:
      - validation_results

  summarize:
    action: inference
    description: "Summarize quality gate results into actionable fix tasks"
    context:
      required: [validation_results, project_manifest]
    prompt: |
      You are a quality assessment module in an automated coding pipeline.
      Your output will be parsed by a JSON extractor. Return ONLY a raw JSON
      object — no markdown, no explanation, no surrounding text.

      Project quality gate results:
      {% for check in context.validation_results %}
      - {{ check.name }}: {{ "PASS" if check.passed else "FAIL" }}
        {% if not check.passed %}
        stdout: {{ check.stdout[:200] }}
        stderr: {{ check.stderr[:200] }}
        {% endif %}
      {% endfor %}

      Summarize the results:

      ✅ CORRECT output (raw JSON object, nothing else):
      {
        "all_passing": false,
        "total_checks": 6,
        "passed": 4,
        "failed": 2,
        "summary": "Import errors in clients/api.py (missing APIClient class) and app.py (depends on clients.api). Tests not passing due to missing fixtures.",
        "fix_tasks": [
          {
            "description": "Fix clients/api.py — add APIClient class implementation",
            "file": "clients/api.py",
            "flow": "modify_file",
            "issue": "ImportError: cannot import name 'APIClient'"
          },
          {
            "description": "Fix app.py — update imports after clients/api fix",
            "file": "app.py",
            "flow": "modify_file",
            "issue": "ImportError: depends on clients.api.APIClient"
          }
        ]
      }

      If all checks pass:
      {"all_passing": true, "total_checks": 6, "passed": 6, "failed": 0, "summary": "All quality checks pass", "fix_tasks": []}

      Rules:
      - Each fix_task must target exactly one file.
      - Use "modify_file" flow for fixes to existing files.
      - Group related import errors — if module A fails because module B is broken, fix B first.
      - Be specific about what's wrong in the "issue" field.

      Return ONLY the raw JSON object.
    config:
      temperature: 0.1
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: evaluate_results
        - condition: "true"
          transition: pass_empty
    publishes:
      - inference_response

  evaluate_results:
    action: apply_quality_gate_results
    description: "Parse quality summary and determine pass/fail"
    context:
      required: [inference_response, validation_results]
    resolver:
      type: rule
      rules:
        - condition: "result.all_passing == true"
          transition: gate_pass
        - condition: "result.all_passing == false"
          transition: gate_fail
        - condition: "true"
          transition: gate_pass
    publishes:
      - quality_results

  gate_pass:
    action: noop
    description: "Project passes quality gate"
    terminal: true
    status: success

  gate_fail:
    action: noop
    description: "Project has quality issues needing fix tasks"
    terminal: true
    status: failed

  pass_empty:
    action: noop
    description: "No files to check or could not plan checks"
    terminal: true
    status: success

entry: scan_project
