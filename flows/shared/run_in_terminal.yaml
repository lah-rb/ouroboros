flow: run_in_terminal
version: 2
description: >
  Multi-turn persistent terminal session. Starts a shell subprocess,
  sends commands, observes output, and loops via LLM menu until the
  session goal is achieved or the model decides to close.
  Used as a sub-flow by validate_behavior, quality_gate, manage_packages, etc.
  There is no artificial turn limit — debugging sessions are unpredictable
  and the model decides when it has enough information.

input:
  required:
    - session_goal
    - working_directory
  optional:
    - initial_commands
    - session_context
    - environment_vars

defaults:
  config:
    temperature: "t*0.8"

steps:

  start_session:
    action: start_terminal_session
    description: "Start persistent shell, memoryful inference session, and run setup commands"
    params:
      working_directory: "{{ input.working_directory }}"
      initial_commands: "{{ input.initial_commands }}"
      environment_vars: "{{ input.environment_vars }}"
      session_goal: "{{ input.session_goal }}"
      session_context: "{{ input.session_context }}"
    resolver:
      type: rule
      rules:
        - condition: "result.session_started == true"
          transition: plan_next_command
        - condition: "true"
          transition: close_failure
    publishes:
      - session_id
      - inference_session_id
      - session_history

  plan_next_command:
    action: inference
    description: "LLM decides what command to run next"
    context:
      required: [session_id, session_history]
      optional: [inference_session_id]
    prompt: |
      You are a terminal operator in an automated coding pipeline.
      Your output will be parsed by a JSON extractor. Return ONLY a raw JSON
      object — no markdown, no explanation, no surrounding text.

      SESSION GOAL: {{ input.session_goal }}
      {% if input.session_context %}
      CONTEXT: {{ input.session_context }}
      {% endif %}

      IMPORTANT CONSTRAINTS:
      - This is a READ-ONLY session. Do NOT modify, create, or delete files.
      - No cat > file, sed -i, echo > file, or any write commands.
      - Your job is to observe, run, and diagnose — not to fix.

      {% if context.session_history %}
      SESSION HISTORY:
      {% for entry in context.session_history %}
      [Turn {{ entry.turn }}] $ {{ entry.command }}
      {{ entry.output }}
      {% if entry.return_code != 0 %}(exit code: {{ entry.return_code }}){% endif %}
      {% if entry.timed_out %}⚠️ TIMED OUT{% endif %}
      {% endfor %}
      {% else %}
      No commands have been run yet. This is the first interaction.
      {% endif %}

      What command should run next?

      ✅ CORRECT output (raw JSON, nothing else):
      {"command": "echo 'look' | python main.py", "rationale": "Testing the look command"}

      ❌ WRONG — no explanation outside JSON:
      Let me test the look command:
      {"command": "echo 'look' | python main.py", "rationale": "Testing look"}

      Rules:
      - Return ONLY the JSON object.
      - Persistent bash shell — state carries over between turns.
      - For interactive programs: echo "input" | command
      - One command at a time.
      - Do NOT modify any files.
    config:
      temperature: "t*0.6"
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: execute_command
        - condition: "true"
          transition: close_failure
    publishes:
      - inference_response

  execute_command:
    action: send_terminal_command
    description: "Send LLM-planned command to the terminal session"
    context:
      required: [session_id, session_history, inference_response]
    params:
      command_timeout: 30
    resolver:
      type: rule
      rules:
        - condition: "result.stuck_detected == true"
          transition: close_success
        - condition: "result.command_sent == true"
          transition: evaluate
        - condition: "true"
          transition: close_failure
    publishes:
      - session_id
      - session_history

  evaluate:
    action: inference
    description: "LLM evaluates session progress — short assessment only"
    context:
      required: [session_id, session_history]
      optional: [inference_session_id]
    prompt: |
      You are evaluating a terminal session. Give a SHORT assessment (1-3 sentences).

      SESSION GOAL: {{ input.session_goal }}

      LAST COMMAND AND OUTPUT:
      {% if context.session_history %}
      {% set last = context.session_history[-1] %}
      [Turn {{ last.turn }}] $ {{ last.command }}
      {{ last.output }}
      {% if last.return_code != 0 %}(exit code: {{ last.return_code }}){% endif %}
      {% endif %}

      TURN COUNT: {{ context.session_history | length }}

      Decide: Is the goal achieved, do you need more commands, or is there
      an unrecoverable blocker? If you have identified a root cause, close
      the session — fixes happen in other flows, not here.
    config:
      temperature: "t*0.3"
      max_tokens: 200
    resolver:
      type: llm_menu
      default_transition: close_failure
      include_step_output: true
      prompt: "Pick one:"
      options:
        exit_success:
          description: "CLOSE — goal achieved or root cause identified"
          target: close_success
        continue_interaction:
          description: "CONTINUE — need more commands to diagnose or verify"
          target: plan_next_command
        exit_failure:
          description: "CLOSE — unrecoverable blocker, cannot proceed"
          target: close_failure
    publishes:
      - inference_response

  close_success:
    action: close_terminal_session
    description: "Close terminal and inference session — goal achieved"
    context:
      required: [session_id, session_history]
      optional: [inference_session_id]
    terminal: true
    status: success
    publishes:
      - session_summary
      - session_history

  close_failure:
    action: close_terminal_session
    description: "Close terminal and inference session — session failed"
    context:
      optional: [session_id, session_history, inference_session_id]
    terminal: true
    status: failed
    publishes:
      - session_summary
      - session_history

entry: start_session
