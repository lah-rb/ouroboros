# Flow Registry — discovery mechanism for all available flows.
# Lists each flow with metadata. Loaded at startup by the runtime.
#
# v2: Removed frustration_level, temperature_multiplier, frustration_history
# from task flow optionals — these are no longer dispatched by mission_control.
# Task descriptions are intent-based; flow field on TaskRecord is optional.

flows:
  mission_control:
    type: orchestrator
    description: "Core director — reasons about mission state and dispatches to best action"
    file: mission_control.yaml
    inputs:
      required: [mission_id]
      optional: [last_result, last_status, last_task_id, quality_gate_retries]
    terminal_statuses: [completed, deadlocked, aborted]

  create_plan:
    type: orchestrator
    description: "Generate intent-based task plan from mission objective"
    file: create_plan.yaml
    inputs:
      required: [mission_id]
      optional: [existing_progress]
    terminal_statuses: [failed]

  create_file:
    type: task
    description: "Create one or more new source files with project context awareness"
    file: tasks/create_file.yaml
    inputs:
      required: [mission_id, task_id]
      optional: [task_description, mission_objective, working_directory, target_file_path, relevant_notes]
    terminal_statuses: []

  modify_file:
    type: task
    description: "AST-aware file modification — symbol-level or full rewrite"
    file: tasks/modify_file.yaml
    inputs:
      required: [mission_id, task_id, target_file_path]
      optional: [task_description, mission_objective, working_directory, reason, relevant_notes, mode]
    terminal_statuses: []

  file_write:
    type: task
    description: "Create or modify source files — deterministic routing based on file existence. Supports prompt_variant for test generation."
    file: cue/file_write.cue
    inputs:
      required: [mission_id, task_id, target_file_path]
      optional: [task_description, mission_objective, working_directory, reason, relevant_notes, mode, prompt_variant]
    terminal_statuses: []

  project_ops:
    type: task
    description: "Initialize and configure project tooling (language agnostic)"
    file: tasks/project_ops.yaml
    inputs:
      required: [mission_id, task_id]
      optional: [task_description, mission_objective, working_directory, setup_focus, relevant_notes]
    terminal_statuses: []

  diagnose_issue:
    type: task
    description: "Methodical diagnosis of code issues — separate from fixing"
    file: tasks/diagnose_issue.yaml
    inputs:
      required: [target_file_path]
      optional: [error_description, mission_id, task_id, task_description, mission_objective, error_output, previous_attempt, working_directory, relevant_notes]
    terminal_statuses: [success, failed]

  explore_spike:
    type: task
    description: "Time-boxed investigation producing findings, not code changes"
    file: tasks/explore_spike.yaml
    inputs:
      required: [investigation_goal]
      optional: [mission_id, task_id, task_description, mission_objective, scope_hint, working_directory, specific_questions, relevant_notes]
    terminal_statuses: [success]

  design_architecture:
    type: task
    description: "Holistic project design — layout, modules, interfaces, execution conventions"
    file: tasks/design_architecture.yaml
    inputs:
      required: [mission_id, task_id]
      optional: [task_description, mission_objective, working_directory, relevant_notes]
    terminal_statuses: []

  integrate_modules:
    type: task
    description: "Project cohesion inspector — checks imports, names, interfaces, reports issues"
    file: tasks/integrate_modules.yaml
    inputs:
      required: [mission_id, task_id]
      optional: [task_description, mission_objective, working_directory, relevant_notes, integration_hints]
    terminal_statuses: []

  refactor:
    type: task
    description: "Deliberate structural improvement using Fowler's vocabulary"
    file: tasks/refactor.yaml
    inputs:
      required: [mission_id, task_id, target_file_path]
      optional: [task_description, mission_objective, working_directory, reason, specific_smells, refactoring_budget, findings, relevant_notes]
    terminal_statuses: []

  document_project:
    type: task
    description: "Produce or update README, docstrings, and architecture docs"
    file: tasks/document_project.yaml
    inputs:
      required: [mission_id, task_id]
      optional: [task_description, mission_objective, working_directory, target_file_path, reason, doc_scope, findings, relevant_notes]
    terminal_statuses: []

  retrospective:
    type: task
    description: "Post-completion learning capture — reflect on what worked and what to remember"
    file: tasks/retrospective.yaml
    inputs:
      required: [mission_id]
      optional: [task_id, task_description, working_directory, trigger_reason, scope]
    terminal_statuses: [success]

  request_review:
    type: task
    description: "Proactive code review submission to senior dev (stub until Phase 6)"
    file: tasks/request_review.yaml
    inputs:
      required: [mission_id, task_id]
      optional: [task_description, mission_objective, working_directory, work_summary, files_to_review, design_decisions, specific_concerns, quality_gate_observations, relevant_notes]
    terminal_statuses: [success]

  validate_behavior:
    type: task
    description: "Run the project code interactively to verify behavior"
    file: tasks/validate_behavior.yaml
    inputs:
      required: [mission_id, task_id]
      optional: [task_description, mission_objective, working_directory, target_file_path, entry_point, test_scenarios, reason, relevant_notes]
    terminal_statuses: []

  manage_packages:
    type: task
    description: "Detect, create, and manage project virtual environment and packages"
    file: tasks/manage_packages.yaml
    inputs:
      required: [mission_id, task_id]
      optional: [task_description, mission_objective, working_directory, packages_to_install, target_file_path, reason, relevant_notes]
    terminal_statuses: []

  # ── Shared sub-flows ────────────────────────────────────────

  prepare_context:
    type: shared
    description: "Scan workspace and curate relevant context for a task"
    file: shared/prepare_context.yaml
    inputs:
      required: [working_directory, task_description]
      optional: [mission_objective, target_file_path, frustration_history, context_budget, relevant_notes]

  validate_output:
    type: shared
    description: "LLM-driven file validation"
    file: shared/validate_output.yaml
    inputs:
      required: [file_path, working_directory]
      optional: [project_manifest, validation_hint, relevant_notes, test_path, max_attempts]

  capture_learnings:
    type: shared
    description: "Reflect on completed work and persist observations"
    file: shared/capture_learnings.yaml
    inputs:
      required: [task_description]
      optional: [target_file_path, task_outcome, learning_focus, category]

  research_context:
    type: shared
    description: "Research dispatcher — routes to web search, repomap, git history, or technical docs"
    file: shared/research_context.yaml
    inputs:
      required: [problem_description]
      optional: [error_output, search_hints, max_queries, working_directory, target_file_path]

  research_repomap:
    type: shared
    description: "AST-based repo map with tree-sitter + PageRank for structural understanding"
    file: shared/research_repomap.yaml
    inputs:
      required: [research_query]
      optional: [working_directory, target_file_path, focus_files]

  research_codebase_history:
    type: shared
    description: "Git archaeology — plan and execute git commands to answer history questions"
    file: shared/research_codebase_history.yaml
    inputs:
      required: [research_query]
      optional: [working_directory, target_file, time_range]

  research_technical:
    type: shared
    description: "Technical literature search targeting authoritative sources"
    file: shared/research_technical.yaml
    inputs:
      required: [research_query]
      optional: [domain_hint]

  revise_plan:
    type: shared
    description: "Mid-mission plan revision based on new observations"
    file: shared/revise_plan.yaml
    inputs:
      required: [mission_id, observation]
      optional: [discovered_requirement, affected_task_id]

  run_in_terminal:
    type: shared
    description: "Multi-turn persistent terminal session for interactive command execution"
    file: shared/run_in_terminal.yaml
    inputs:
      required: [session_goal, working_directory]
      optional: [initial_commands, session_context, environment_vars]

  quality_gate:
    type: shared
    description: "Project-wide quality validation — checkpoint or completion mode"
    file: shared/quality_gate.yaml
    inputs:
      required: [working_directory, mission_id]
      optional: [mission_objective, relevant_notes, architecture_run_command, architecture_import_scheme, architecture_modules, mode]

  ast_edit_session:
    type: shared
    description: "Memoryful AST-aware symbol selection and sequential rewrite session"
    file: shared/ast_edit_session.yaml
    inputs:
      required: [file_path, file_content, symbol_table, symbol_menu_options, task_description]
      optional: [reason, mode, relevant_notes, working_directory]

  # ── Test flows ──────────────────────────────────────────────

  test_simple:
    type: test
    description: "A simple test flow: read a file → check condition → branch → terminal"
    file: test_simple.yaml
    inputs:
      required: [target_file_path]
      optional: [reason]
    terminal_statuses: [success, failed]

  test_branching:
    type: test
    description: "Test flow with multiple branch paths and context accumulation"
    file: test_branching.yaml
    inputs:
      required: [mode]
      optional: [extra_data]
    terminal_statuses: [success]

  test_inference:
    type: test
    description: "Test flow exercising inference action and LLM menu resolver"
    file: test_inference.yaml
    inputs:
      required: [target_file_path]
      optional: []
    terminal_statuses: [success, failed]
