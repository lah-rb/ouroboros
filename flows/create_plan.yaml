flow: create_plan
version: 1
description: >
  Generate a task plan from mission objective with quality validation.
  Uses prepare_context to see existing project state.
  Retries up to 2 times if the plan is inadequate.

input:
  required:
    - mission_id
  optional:
    - existing_progress

defaults:
  config:
    temperature: "t*1"
    max_tokens: 4096

steps:

  load_mission:
    action: load_mission_state
    description: "Load mission to get objective and working directory"
    resolver:
      type: rule
      rules:
        - condition: "result.mission.status == 'active'"
          transition: gather_context
        - condition: "true"
          transition: failed
    publishes:
      - mission

  gather_context:
    use: gather_project_context
    params:
      context_budget: 10
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: generate_plan

  generate_plan:
    action: inference
    description: "Generate task plan from objective"
    context:
      required: [mission]
      optional: [context_bundle, project_manifest, repo_map_formatted]
    prompt: |
      You are a planning module in an automated coding pipeline.
      Your output will be parsed by a JSON extractor. Do NOT include any text
      outside the JSON array — no markdown, no explanation, no commentary.

      Objective: {{ context.mission.objective }}
      Working directory: {{ context.mission.config.working_directory }}

      {% if input.existing_progress %}
      Previous progress: {{ input.existing_progress }}
      {% endif %}

      {% if context.repo_map_formatted %}
      ## Existing Project Structure (AST-based — symbols, classes, functions)
      {{ context.repo_map_formatted }}
      {% endif %}

      {% if context.project_manifest %}
      Existing files in project:
      {% for filepath, sig in context.project_manifest.items() %}
      - {{ filepath }}: {{ sig[:80] }}
      {% endfor %}
      {% endif %}

      {% if context.mission.notes %}
      Notes from previous work:
      {% for note in context.mission.notes[-5:] %}
      - [{{ note.category }}] {{ note.content }}
      {% endfor %}
      {% endif %}

      Create a task plan as a JSON array. Each task produces or modifies exactly one file.
      Order tasks so dependencies come first (lower index = higher priority).
      Include 3-8 tasks depending on complexity.

      CRITICAL ORDERING RULES:
      - Library/utility modules FIRST (no imports from other project files).
      - Domain/logic modules NEXT (import from utility modules).
      - Entry points and CLI modules LAST (import from everything else).
      - Use "depends_on" to reference descriptions of tasks that must complete first.
      - The entry point / main module should ALWAYS depend on all other modules
        so it is created last with full context of their actual APIs.

      FLOW SELECTION — choose the right flow for each task:
      - "design_architecture" — FIRST task for any multi-file project. Designs directory layout,
        module boundaries, and interface contracts BEFORE any files are created. This prevents
        conflicting module structures and ensures all files integrate cleanly.
      - "create_file" — New source files (modules, scripts, configs). NOT for test files.
      - "modify_file" — Changes to existing files.
      - "create_tests" — Test files (pytest, unittest). ALWAYS use this for test_*.py files.
      - "setup_project" — Project initialization (directories, pyproject.toml, configs).
      - "manage_packages" — Installing/removing dependencies.
      - "integrate_modules" — Wiring modules together, ensuring cross-module imports work.
      - "validate_behavior" — End-to-end verification that the project works as specified.

      A good plan uses 3-4 different flow types. If every task uses "create_file", the plan is wrong.
      For projects with 3+ files, the FIRST task MUST be "design_architecture" to establish
      the module layout before any code is written. This prevents duplicate/conflicting structures.
      If the objective mentions integration, include an "integrate_modules" task.
      If the objective mentions tests, use "create_tests" (not "create_file") for test files.
      ALWAYS include a "validate_behavior" task as the final step to verify the system works.

      ✅ CORRECT output (raw JSON array, nothing else — note the varied flow types):
      [
        {
          "description": "Create the shared database module with schema and query functions",
          "file": "database.py",
          "flow": "create_file",
          "depends_on": []
        },
        {
          "description": "Create the task tracker CLI using the shared database module",
          "file": "tasks.py",
          "flow": "create_file",
          "depends_on": ["Create the shared database module with schema and query functions"]
        },
        {
          "description": "Create pytest test suite for the database layer with 8+ test cases",
          "file": "tests/test_database.py",
          "flow": "create_tests",
          "depends_on": ["Create the shared database module with schema and query functions"]
        },
        {
          "description": "Wire modules together — verify tasks.py imports from database.py correctly",
          "file": "tasks.py",
          "flow": "integrate_modules",
          "depends_on": ["Create the task tracker CLI using the shared database module"]
        },
        {
          "description": "Verify end-to-end behavior: CLI tools work, tests pass, modules integrated",
          "file": "",
          "flow": "validate_behavior",
          "depends_on": ["Wire modules together — verify tasks.py imports from database.py correctly"]
        }
      ]

      ❌ WRONG — do not wrap in markdown code blocks:
      ```json
      [{"description": "..."}]
      ```

      ❌ WRONG — do not add explanation before or after:
      Here is the plan:
      [{"description": "..."}]

      ❌ WRONG — every task uses "create_file":
      [{"flow": "create_file"}, {"flow": "create_file"}, {"flow": "create_file"}]

      Rules:
      - Select the MOST SPECIFIC flow for each task (see flow selection above).
      - File paths must be relative to the working directory.
      - If existing files are present, plan tasks that integrate with them.
      - Do NOT include tasks for files that already exist unless they need changes.
      - Entry points / main modules must be the LAST task with depends_on listing all others.
      - Test files MUST use "create_tests" flow, not "create_file".

      Return ONLY the raw JSON array.
    config:
      temperature: 0.4
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: parse_plan
        - condition: "true"
          transition: failed
    publishes:
      - inference_response

  parse_plan:
    action: create_plan_from_objective
    description: "Parse LLM response into task records"
    context:
      required: [mission, inference_response]
    resolver:
      type: rule
      rules:
        - condition: "result.plan_created == true and result.task_count >= 2"
          transition: complete
        - condition: "result.plan_created == true"
          transition: complete
        - condition: "true"
          transition: failed
    publishes:
      - mission

  retry_plan:
    action: inference
    description: "Re-prompt with explicit feedback on format"
    context:
      required: [mission, inference_response]
      optional: [context_bundle, project_manifest]
    prompt: |
      You are a planning module in an automated coding pipeline.
      Your previous response could not be parsed. Here is what you returned:

      {{ context.inference_response[:500] }}

      The JSON extractor failed. You MUST return a raw JSON array with no
      surrounding text, no markdown code blocks, no explanation.

      The objective is: {{ context.mission.objective }}

      ✅ CORRECT — raw JSON, nothing else:
      [
        {
          "description": "Create the CLI argument parser",
          "file": "cli.py",
          "flow": "create_file",
          "depends_on": []
        },
        {
          "description": "Create the core processing module",
          "file": "core/processor.py",
          "flow": "create_file",
          "depends_on": []
        },
        {
          "description": "Wire CLI to processor in main entry point",
          "file": "main.py",
          "flow": "create_file",
          "depends_on": ["Create the CLI argument parser", "Create the core processing module"]
        }
      ]

      ❌ WRONG — no markdown wrapping:
      ```json
      [...]
      ```

      Produce 3-8 specific, actionable tasks. Each MUST have "description", "file", and "flow" fields.

      Return ONLY the raw JSON array.
    config:
      temperature: 0.5
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: parse_plan
        - condition: "true"
          transition: failed
    publishes:
      - inference_response

  complete:
    action: noop
    description: "Plan created — return to mission_control"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_status: "success"

  failed:
    action: log_completion
    description: "Planning failed"
    params:
      message: "Failed to create plan"
    terminal: true
    status: failed

entry: load_mission

overflow:
  strategy: split
  fallback: reorganize
