flow: create_plan
version: 1
description: >
  Ask the LLM to break a mission objective into concrete tasks,
  then save the plan and tail-call back to mission_control.

input:
  required:
    - mission_id
  optional:
    - existing_progress

defaults:
  config:
    temperature: 0.4
    max_tokens: 2048

steps:

  load_mission:
    action: load_mission_state
    description: "Load mission state to get objective"
    resolver:
      type: rule
      rules:
        - condition: "result.mission.status == 'active'"
          transition: generate_plan
        - condition: "true"
          transition: failed
    publishes:
      - mission

  generate_plan:
    action: inference
    description: "Ask the model to create a task plan from the objective"
    context:
      required: [mission]
    prompt: |
      You are a software developer planning a project.

      Objective: {{ context.mission.objective }}

      Break this objective into concrete implementation tasks.
      Each task should create one file. For each task provide:
      - A description of what to build
      - The filename to create

      Respond with a JSON array of objects with "description" and "file" keys.
      Example: [{"description": "Create main application", "file": "app.py"}]

      Keep it to 2-4 focused tasks. Be creative and specific.
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: parse_plan
        - condition: "true"
          transition: failed
    publishes:
      - inference_response

  parse_plan:
    action: create_plan_from_objective
    description: "Parse the LLM response into task records"
    context:
      required: [mission, inference_response]
    resolver:
      type: rule
      rules:
        - condition: "result.plan_created == true"
          transition: complete
        - condition: "true"
          transition: failed
    publishes:
      - mission

  complete:
    action: noop
    description: "Plan created — return to mission_control"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_status: "success"

  failed:
    action: log_completion
    description: "Planning failed"
    params:
      message: "Failed to create plan"
    terminal: true
    status: failed

entry: load_mission

overflow:
  strategy: split
  fallback: reorganize
