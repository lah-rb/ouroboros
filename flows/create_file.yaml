flow: create_file
version: 1
description: >
  Create a new file based on a task description. Uses inference to
  generate the file content, writes it, validates with a syntax check,
  then tail-calls back to mission_control.

input:
  required:
    - mission_id
    - task_id
  optional:
    - task_description
    - mission_objective
    - working_directory
    - target_file_path
    - reason

defaults:
  config:
    temperature: 0.3
    max_tokens: 4096

steps:

  generate_content:
    action: inference
    description: "Ask the model to generate the file content"
    prompt: |
      You are a skilled Python developer.

      Project objective: {{ input.mission_objective }}
      Task: {{ input.task_description }}
      Target file: {{ input.target_file_path }}

      Write the complete Python file content for this task.
      Make it interesting, well-structured, and fully functional.
      Include docstrings and comments.

      Respond with ONLY the Python code wrapped in ```python ... ``` markers.
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: write_file
        - condition: "true"
          transition: failed
    publishes:
      - inference_response

  write_file:
    action: execute_file_creation
    description: "Extract code from response and write to file"
    context:
      required: [inference_response]
    params:
      target_file_path: "{{ input.target_file_path }}"
    resolver:
      type: rule
      rules:
        - condition: "result.write_success == true"
          transition: validate
        - condition: "true"
          transition: failed
    publishes:
      - created_file

  validate:
    action: run_tests
    description: "Run a syntax check on the created file"
    params:
      command: ["python", "-c", "import py_compile; py_compile.compile('{{ input.target_file_path }}', doraise=True)"]
    resolver:
      type: rule
      rules:
        - condition: "result.all_passing == true"
          transition: complete
        - condition: "true"
          transition: complete_with_warning

  complete:
    action: noop
    description: "File created and validated — return to mission_control"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "Created {{ input.target_file_path }}"

  complete_with_warning:
    action: noop
    description: "File created but validation had issues — still return success"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "Created {{ input.target_file_path }} (with warnings)"

  failed:
    action: noop
    description: "File creation failed"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "abandoned"

entry: generate_content

overflow:
  strategy: split
  fallback: reorganize
