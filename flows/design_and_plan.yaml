flow: design_and_plan
version: 1
description: >
  Merged architecture + plan flow. Architecture design runs first and
  produces structured ArchitectureState on the mission. Plan generation
  then receives the architecture as input and creates tasks with file
  paths that match the architecture's canonical module list.
  This eliminates the architecture/plan desynchronization problem.

input:
  required:
    - mission_id
  optional:
    - existing_progress

defaults:
  config:
    temperature: "t*0.6"

steps:

  # ── Phase 1: Load mission and scan workspace ────────────────

  load_mission:
    action: load_mission_state
    description: "Load mission to get objective and working directory"
    resolver:
      type: rule
      rules:
        - condition: "result.mission.status == 'active'"
          transition: scan_workspace
        - condition: "true"
          transition: failed
    publishes:
      - mission

  scan_workspace:
    action: scan_project
    description: "Discover existing files and structure"
    params:
      root: "."
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: build_repomap
    publishes:
      - project_manifest

  build_repomap:
    action: build_and_query_repomap
    description: "Build AST-based dependency map of existing code"
    params:
      root: "."
      include_patterns: ["*.py", "*.js", "*.ts", "*.rs", "*.yaml", "*.yml"]
      max_chars: 4000
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: design_structure
    publishes:
      - repo_map_formatted

  # ── Phase 2: LLM designs the architecture ──────────────────

  design_structure:
    action: inference
    description: "Design project structure — layout, modules, interfaces, execution conventions"
    context:
      required: [mission]
      optional: [project_manifest, repo_map_formatted]
    prompt: |
      You are a software architect module in an automated coding pipeline.
      Your output will be parsed by a JSON extractor. Return ONLY a raw JSON
      object — no markdown, no explanation, no surrounding text.

      ## Mission Objective
      {{ context.mission.objective }}

      {% if context.repo_map_formatted %}
      ## Existing Code Structure (AST-based)
      {{ context.repo_map_formatted }}
      {% endif %}

      {% if context.project_manifest %}
      ## Existing Files
      {% for filepath, sig in context.project_manifest.items() %}
      - {{ filepath }}: {{ sig[:100] }}
      {% endfor %}
      {% endif %}

      ## Design a Project Architecture

      Produce a SINGLE authoritative blueprint that defines:

      1. **Execution Convention**: How to run the project. Specify:
         - The command to run the application (e.g., `python main.py`)
         - The import scheme: flat (`from models import X`), package
           (`from src.models import X`), or relative (`from .models import X`)
         - Whether `__init__.py` files are needed
         - The assumed working directory
         This is CRITICAL — every file created after this follows these conventions.

      2. **Directory Layout**: Flat or nested? Which directories and why?
         If files already exist, the layout MUST be compatible with them.

      3. **Module Responsibilities**: For each file, specify what it defines,
         what it imports from other project modules, and its public API.

      4. **Interface Contracts**: For each cross-module dependency,
         specify caller, callee, symbol name, and expected signature.

      5. **Data Shapes**: For data files (YAML, JSON, config) and the code that
         reads them, specify the expected structure. This ensures the file that
         writes/defines the data and the file that reads/loads it agree on format.
         Example: "rooms is a list of dicts, each with keys: id, name, description, connections"
         vs "rooms is a dict keyed by room_id, each value has keys: name, description, connections"
         Getting this wrong causes runtime crashes. Be explicit.

      6. **Creation Order**: Dependency-sorted. Files with no project imports
         come first. Entry points come last.

      ✅ CORRECT output (raw JSON object):
      {
        "execution": {
          "run_command": "python main.py",
          "import_scheme": "flat",
          "init_files": false,
          "working_directory": "project root"
        },
        "modules": [
          {
            "file": "models.py",
            "responsibility": "Data classes for rooms, items, NPCs",
            "defines": ["Room", "Item", "NPC"],
            "imports_from": {}
          }
        ],
        "interfaces": [
          {
            "caller": "engine.py",
            "callee": "parser.py",
            "symbol": "parse_command",
            "signature": "parse_command(raw: str) -> Command"
          }
        ],
        "data_shapes": [
          {
            "file": "world_data.yaml",
            "consumed_by": "loader.py",
            "structure": "rooms: list of {id: str, name: str, description: str, connections: {direction: room_id}}"
          }
        ],
        "creation_order": ["models.py", "parser.py", "engine.py", "main.py"],
        "notes": "Brief notes on design rationale"
      }

      ❌ WRONG — do not wrap in markdown or add explanation.
      ❌ WRONG — do not propose a layout that conflicts with existing files.

      Return ONLY the raw JSON object.
    config:
      temperature: 0.4
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: parse_architecture
        - condition: "true"
          transition: failed
    publishes:
      - inference_response

  # ── Phase 3: Parse architecture into structured state ───────

  parse_architecture:
    action: parse_and_store_architecture
    description: "Parse architecture JSON and store as mission.architecture"
    context:
      required: [mission, inference_response]
    resolver:
      type: rule
      rules:
        - condition: "result.architecture_parsed == true"
          transition: generate_plan
        - condition: "true"
          transition: generate_plan_no_architecture
    publishes:
      - mission
      - architecture

  # ── Phase 4: Generate plan aligned to architecture ──────────

  generate_plan:
    action: inference
    description: "Generate task plan aligned to the architecture blueprint"
    context:
      required: [mission, architecture]
      optional: [project_manifest]
    prompt: |
      You are a planning module in an automated coding pipeline.
      Your output will be parsed by a JSON extractor. Do NOT include any text
      outside the JSON array — no markdown, no explanation, no commentary.

      Objective: {{ context.mission.objective }}
      Working directory: {{ context.mission.config.working_directory }}

      ## Architecture Blueprint (AUTHORITATIVE)
      Import scheme: {{ context.architecture.import_scheme }}
      Run command: {{ context.architecture.run_command }}

      Modules (in creation order):
      {% for file in context.architecture.creation_order %}
      {% set mod = context.architecture.modules | selectattr('file', 'equalto', file) | first %}
      {% if mod %}
      - {{ mod.file }}: {{ mod.responsibility }}
        Defines: {{ mod.defines | join(', ') }}
        Imports from: {{ mod.imports_from }}
      {% else %}
      - {{ file }}
      {% endif %}
      {% endfor %}

      {% if context.architecture.interfaces %}
      Interfaces:
      {% for iface in context.architecture.interfaces %}
      - {{ iface.caller }} → {{ iface.callee }}: {{ iface.symbol }}({{ iface.signature }})
      {% endfor %}
      {% endif %}

      {% if context.project_manifest %}
      Existing files (already created):
      {% for filepath in context.project_manifest.keys() %}
      - {{ filepath }}
      {% endfor %}
      {% endif %}

      CRITICAL: File paths in your plan MUST match the architecture blueprint above.
      Use EXACTLY the file paths from the creation_order list. Do NOT invent new paths.

      Create a task plan as a JSON array. Order tasks so dependencies come first.

      ✅ CORRECT output (raw JSON array, nothing else):
      [
        {
          "description": "Create the state management module with GameState class",
          "inputs": {"target_file_path": "{{ context.architecture.creation_order[0] if context.architecture.creation_order else 'app.py' }}"},
          "depends_on": []
        }
      ]

      Rules:
      - File paths MUST match the architecture exactly.
      - Describe outcomes, not tools. Do NOT include a "flow" field.
      - Architecture design is already done — do NOT include an architecture task.
      - Include integration and validation tasks after file creation.
      - Entry points / main modules must be the LAST creation task.

      Return ONLY the raw JSON array.
    config:
      temperature: 0.4
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: parse_plan
        - condition: "true"
          transition: failed
    publishes:
      - inference_response

  # ── Phase 4b: Plan without architecture (fallback) ──────────

  generate_plan_no_architecture:
    action: inference
    description: "Generate plan without structured architecture (architecture parse failed)"
    context:
      required: [mission]
      optional: [project_manifest, repo_map_formatted]
    prompt: |
      You are a planning module in an automated coding pipeline.
      Your output will be parsed by a JSON extractor. Do NOT include any text
      outside the JSON array.

      Objective: {{ context.mission.objective }}
      Working directory: {{ context.mission.config.working_directory }}

      {% if context.project_manifest %}
      Existing files: {{ context.project_manifest.keys() | list }}
      {% endif %}

      Create a task plan as a JSON array with 3-8 tasks.
      Each task needs "description", "inputs" (with "target_file_path" if applicable),
      and "depends_on" (list of task descriptions this depends on).

      Return ONLY the raw JSON array.
    config:
      temperature: 0.4
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: parse_plan
        - condition: "true"
          transition: failed
    publishes:
      - inference_response

  # ── Phase 5: Parse plan into tasks ──────────────────────────

  parse_plan:
    action: create_plan_from_architecture
    description: "Parse LLM plan response into task records, validated against architecture"
    context:
      required: [mission, inference_response]
      optional: [architecture]
    resolver:
      type: rule
      rules:
        - condition: "result.plan_created == true and result.task_count >= 2"
          transition: complete
        - condition: "result.plan_created == true"
          transition: complete
        - condition: "true"
          transition: failed
    publishes:
      - mission

  # ── Terminal paths ──────────────────────────────────────────

  complete:
    action: noop
    description: "Architecture designed and plan created — return to mission_control"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_status: "success"

  failed:
    action: log_completion
    description: "Design and planning failed"
    params:
      message: "Failed to design architecture and create plan"
    terminal: true
    status: failed

entry: load_mission

overflow:
  strategy: split
  fallback: reorganize
