flow: refactor
version: 2
description: >
  Improve code structure without changing behavior. Reads the target file,
  uses AST-aware editing for precise refactoring. Clear error if file
  doesn't exist.

input:
  required:
    - mission_id
    - task_id
    - target_file_path
  optional:
    - task_description
    - mission_objective
    - working_directory
    - reason
    - relevant_notes
    - specific_smells
    - findings

defaults:
  config:
    temperature: "t*0.5"

steps:

  gather_context:
    use: gather_project_context
    params:
      context_budget: 8
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: read_target

  read_target:
    use: read_target_file
    resolver:
      type: rule
      rules:
        - condition: "result.file_found == true"
          transition: extract_symbols
        - condition: "true"
          transition: error_file_not_found

  extract_symbols:
    action: extract_symbol_bodies
    description: "Parse file for AST-aware refactoring"
    context:
      required: [target_file]
    resolver:
      type: rule
      rules:
        - condition: "result.symbols_extracted > 0"
          transition: ast_refactor
        - condition: "true"
          transition: full_rewrite
    publishes:
      - symbol_table
      - symbol_menu_options

  ast_refactor:
    action: flow
    description: "AST-aware refactoring session"
    flow: ast_edit_session
    input_map:
      file_path: "{{ input.target_file_path }}"
      file_content: "{{ context.target_file.content }}"
      symbol_table: "{{ context.symbol_table }}"
      symbol_menu_options: "{{ context.symbol_menu_options }}"
      task_description: "{{ input.task_description }}"
      reason: "{{ input.reason }}"
      mode: "refactor"
      relevant_notes: "{{ input.relevant_notes }}"
      working_directory: "{{ input.working_directory }}"
    resolver:
      type: rule
      rules:
        - condition: "result.status == 'success'"
          transition: complete
        - condition: "result.status == 'full_rewrite_requested'"
          transition: full_rewrite
        - condition: "true"
          transition: failed
    publishes:
      - files_changed
      - edit_summary

  full_rewrite:
    action: inference
    description: "Full file rewrite for structural refactoring"
    context:
      required: [target_file]
      optional: [context_bundle, repo_map_formatted]
    prompt: |
      You are a code refactoring module. Improve structure without changing behavior.

      ## Task
      {{ input.task_description }}

      {% if input.specific_smells %}
      ## Code Smells to Address
      {{ input.specific_smells }}
      {% endif %}

      ## Current File: {{ input.target_file_path }}
      ```
      {{ context.target_file.content }}
      ```

      {% if input.relevant_notes %}
      ## Notes
      {{ input.relevant_notes }}
      {% endif %}

      Produce the COMPLETE refactored file. Preserve all behavior.

      === FILE: {{ input.target_file_path }} ===
      ```
      # complete refactored file
      ```
    config:
      temperature: 0.3
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: write_rewrite
        - condition: "true"
          transition: failed
    publishes:
      - inference_response

  write_rewrite:
    action: apply_multi_file_changes
    description: "Write refactored file"
    context:
      required: [inference_response]
    params:
      content_key: "inference_response"
    resolver:
      type: rule
      rules:
        - condition: "result.files_written > 0"
          transition: complete
        - condition: "true"
          transition: failed
    publishes:
      - files_changed

  complete:
    action: noop
    description: "Refactoring complete"
    context:
      optional: [files_changed, edit_summary]
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "{{ context.edit_summary or 'Refactored ' + input.target_file_path }}"

  error_file_not_found:
    action: noop
    description: "Target file not found"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "failed"
        last_result: "File not found: {{ input.target_file_path }}. Cannot refactor a file that does not exist."

  failed:
    action: noop
    description: "Refactoring failed"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "failed"
        last_result: "Failed to refactor {{ input.target_file_path }}"

entry: gather_context

overflow:
  strategy: split
  fallback: reorganize
