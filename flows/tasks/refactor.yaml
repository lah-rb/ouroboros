flow: refactor
version: 1
description: >
  Deliberate structural improvement of existing code without changing behavior.
  Identifies code smells using Fowler's vocabulary, applies named refactorings
  one at a time, and verifies tests pass after each change. Rolls back on failure.

input:
  required:
    - mission_id
    - task_id
    - target_file_path
  optional:
    - task_description
    - mission_objective
    - working_directory
    - reason
    - specific_smells
    - refactoring_budget
    - findings
    - frustration_level
    - frustration_history
    - relevant_notes

defaults:
  config:
    temperature: "t*0.4"
    max_tokens: 8192

steps:

  # ── Phase 1: Gather context and baseline ───────────────────

  gather_context:
    use: gather_project_context
    params:
      context_budget: 8
    resolver:
      type: rule
      rules:
        - condition: "input.get('target_file_path', '') != ''"
          transition: read_target
        - condition: "true"
          transition: cannot_refactor

  read_target:
    use: read_target_file
    resolver:
      type: rule
      rules:
        - condition: "result.file_found == true"
          transition: baseline_tests
        - condition: "true"
          transition: cannot_refactor

  baseline_tests:
    action: run_project_tests
    description: "Run tests BEFORE any changes — green baseline required"
    context:
      required: [target_file]
      optional: [project_manifest]
    params:
      working_directory: "{{ input.working_directory }}"
    resolver:
      type: rule
      rules:
        - condition: "result.all_passing == true and result.no_tests == false"
          transition: identify_smells
        - condition: "result.no_tests == true"
          transition: identify_smells_no_tests
        - condition: "true"
          transition: cannot_refactor
    publishes:
      - baseline_results

  # ── Phase 2: Identify smells ───────────────────────────────

  identify_smells:
    action: inference
    description: "Analyze code for structural issues using Fowler's vocabulary"
    context:
      required: [target_file]
      optional: [project_manifest, context_bundle]
    prompt: |
      You are a code review module focused on structural quality.
      Do NOT change behavior — only identify structural improvements.
      Tests exist and pass, so you can suggest any safe refactoring.

      ## Target File
      **{{ context.target_file.path }}**
      ```
      {{ context.target_file.content }}
      ```

      {% if input.specific_smells %}
      ## Known Issues to Address
      {{ input.specific_smells }}
      {% endif %}

      {% if input.findings %}
      ## Codebase Context
      {{ input.findings }}
      {% endif %}

      ## Identify Code Smells (Fowler's Catalog)
      Review for: Long Method, Feature Envy, Data Clumps, Primitive Obsession,
      Duplicate Code, Long Parameter List, Dead Code, Inappropriate Naming.

      Also check: missing type hints, missing docstrings, inconsistent style,
      AGENT-TODO markers.

      For each smell found (max 5):
      1. **Smell name**: from the catalog
      2. **Location**: function/class, approximate line
      3. **Proposed refactoring**: name the operation (Extract Method, Rename Variable, etc.)
      4. **Risk**: low / medium / high
      5. **Impact**: low / medium / high

      Prioritize: high-impact, low-risk first.
    config:
      temperature: "t*0.5"
    resolver:
      type: llm_menu
      prompt: "Review the identified smells. How should we proceed?"
      options:
        apply_refactoring:
          description: "Found meaningful refactoring opportunities — proceed"
        code_is_clean:
          description: "The code is already well-structured — no refactoring needed"
        too_risky:
          description: "Identified refactorings are too risky without better test coverage"
    publishes:
      - smell_analysis

  identify_smells_no_tests:
    action: inference
    description: "Safe-only smell analysis — no test safety net"
    context:
      required: [target_file]
      optional: [project_manifest, context_bundle]
    prompt: |
      You are a code review module focused on structural quality.

      **IMPORTANT: This file has NO test coverage.** Only suggest refactorings
      where behavior OBVIOUSLY cannot change:
      - Rename operations (variables, functions, parameters)
      - Adding type hints and docstrings
      - Removing dead code (truly unreachable)
      - Extracting constants from magic numbers/strings

      Do NOT suggest: restructuring logic, extracting methods that change signatures,
      modifying class hierarchies, anything where equivalence isn't obvious.

      ## Target File
      **{{ context.target_file.path }}**
      ```
      {{ context.target_file.content }}
      ```

      For each safe refactoring (max 3):
      1. **Smell name**
      2. **Location**
      3. **Proposed refactoring** (name the operation)
      4. **Why this is safe without tests**: explain the equivalence
    config:
      temperature: "t*0.3"
    resolver:
      type: llm_menu
      prompt: "Any safe refactorings to apply?"
      options:
        apply_refactoring:
          description: "Found safe refactoring opportunities"
        code_is_clean:
          description: "No safe refactorings to suggest"
        needs_tests_first:
          description: "Meaningful refactoring requires test coverage first"
    publishes:
      - smell_analysis

  # ── Phase 3: Apply refactorings one at a time ──────────────

  apply_refactoring:
    action: inference
    description: "Apply ONE named refactoring from the smell analysis"
    context:
      required: [target_file, smell_analysis]
      optional: [previous_refactorings, context_bundle]
    prompt: |
      You are a refactoring module in an automated pipeline.
      Your output will be extracted from code markers and written to disk.
      Apply EXACTLY ONE refactoring — behavior MUST remain identical.

      ## Smell Analysis
      {{ context.smell_analysis }}

      {% if context.previous_refactorings %}
      ## Already Applied
      {% for r in context.previous_refactorings %}
      - {{ r }}
      {% endfor %}
      Apply the NEXT refactoring that hasn't been done yet.
      {% else %}
      Apply the HIGHEST priority refactoring.
      {% endif %}

      ## Current File
      **{{ context.target_file.path }}**
      ```
      {{ context.target_file.content }}
      ```

      ## Rules
      - Apply EXACTLY ONE refactoring operation.
      - Behavior MUST remain identical.
      - Name the refactoring (e.g., "Extract Method: _validate_input from process_data").

      First line of response: **Refactoring applied**: [name]
      Then the complete modified file in ``` markers.

      ✅ CORRECT:
      **Refactoring applied**: Extract Method: _validate_input
      ```
      [complete file]
      ```

      ---DO NOT GENERATE EXTRA CHARACTERS AFTER CODE BLOCK---
    config:
      temperature: "t*0.2"
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: write_refactored
        - condition: "true"
          transition: capture_learnings
    publishes:
      - refactoring_applied
      - inference_response

  write_refactored:
    use: write_file
    resolver:
      type: rule
      rules:
        - condition: "result.write_success == true"
          transition: verify_refactoring
        - condition: "true"
          transition: capture_failure_note

  # ── Phase 4: Verify and loop ───────────────────────────────

  verify_refactoring:
    action: run_project_tests
    description: "Confirm tests still pass after the refactoring"
    context:
      required: [target_file]
      optional: [baseline_results]
    params:
      working_directory: "{{ input.working_directory }}"
    resolver:
      type: rule
      rules:
        - condition: "result.all_passing == true"
          transition: check_more_refactorings
        - condition: "result.no_tests == true"
          transition: check_more_refactorings
        - condition: "true"
          transition: rollback_refactoring
    publishes:
      - post_refactoring_results

  check_more_refactorings:
    action: check_remaining_smells
    description: "Are there more refactorings to apply within budget?"
    context:
      required: [smell_analysis]
      optional: [previous_refactorings, refactoring_applied]
    resolver:
      type: rule
      rules:
        - condition: "result.remaining > 0 and result.applied < 3"
          transition: re_read_target
        - condition: "true"
          transition: capture_learnings
    publishes:
      - previous_refactorings

  re_read_target:
    use: read_target_file
    resolver:
      type: rule
      rules:
        - condition: "result.file_found == true"
          transition: apply_refactoring
        - condition: "true"
          transition: capture_learnings

  rollback_refactoring:
    action: restore_file_from_context
    description: "Last refactoring broke tests — restore pre-refactoring state"
    context:
      required: [target_file]
      optional: [refactoring_applied, post_refactoring_results]
    resolver:
      type: rule
      rules:
        - condition: "result.restored == true"
          transition: check_more_refactorings
        - condition: "true"
          transition: capture_learnings
    publishes:
      - target_file
      - failed_refactoring

  # ── Terminal paths ─────────────────────────────────────────

  capture_learnings:
    use: capture_learnings
    params:
      learning_focus: "general"
      category: "codebase_observation"
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: complete

  complete:
    action: noop
    description: "Refactoring complete — return to mission_control"
    status: success
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "Refactored {{ input.target_file_path }}"

  code_is_clean:
    action: noop
    description: "Code reviewed, no refactoring needed"
    status: success
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "Code is clean — no refactoring needed for {{ input.target_file_path }}"

  too_risky:
    action: noop
    description: "Refactorings identified but too risky"
    status: deferred
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "abandoned"
        last_result: "Refactoring too risky for {{ input.target_file_path }}"

  needs_tests_first:
    action: noop
    description: "Meaningful refactoring blocked on test coverage"
    status: deferred
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "abandoned"
        last_result: "{{ input.target_file_path }} needs tests before refactoring"

  cannot_refactor:
    action: noop
    description: "Tests already failing — can't refactor"
    status: blocked
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "abandoned"
        last_result: "Tests failing — cannot refactor {{ input.target_file_path }}"

  capture_failure_note:
    use: capture_learnings
    params:
      learning_focus: "failure_analysis"
      category: "failure_analysis"
      task_outcome: "FAILED to refactor {{ input.target_file_path }}"
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: failed

  failed:
    action: noop
    description: "Refactoring failed"
    status: failed
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "abandoned"
        last_result: "Failed to refactor {{ input.target_file_path }}"

entry: gather_context

overflow:
  strategy: split
  fallback: reorganize
