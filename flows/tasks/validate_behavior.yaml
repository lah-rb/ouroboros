flow: validate_behavior
version: 2
description: >
  Run the project and verify end-to-end behavior. Uses a terminal
  session to execute the project and check output.

input:
  required:
    - mission_id
    - task_id
  optional:
    - task_description
    - mission_objective
    - working_directory
    - entry_point

defaults:
  config:
    temperature: "t*0.6"

steps:

  gather_context:
    use: gather_project_context
    params:
      context_budget: 6
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: plan_validation

  plan_validation:
    action: inference
    description: "Determine how to validate the project"
    context:
      optional: [project_manifest, repo_map_formatted, context_bundle]
    prompt: |
      You are a validation planning module.

      Objective: {{ input.mission_objective }}
      Task: {{ input.task_description }}

      {% if context.repo_map_formatted %}
      ## Project Structure
      {{ context.repo_map_formatted }}
      {% endif %}

      {% if context.project_manifest %}
      Files: {{ context.project_manifest.keys() | list | join(', ') }}
      {% endif %}

      Determine the commands to run to validate this project works.
      Respond with ONLY a JSON object:
      {
        "session_goal": "Run the project and verify it starts correctly",
        "commands": ["python main.py --help", "echo 'look' | python main.py"],
        "expected_behavior": "brief description of what should happen"
      }

      Choose commands that will terminate on their own (use --help, pipe input,
      or use timeout). Do NOT suggest interactive commands that wait for user input.
    config:
      temperature: 0.2
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: parse_and_run
        - condition: "true"
          transition: failed
    publishes:
      - validation_plan

  parse_and_run:
    action: flow
    description: "Execute the project in a terminal session"
    flow: run_in_terminal
    input_map:
      session_goal: "Validate the project runs correctly: {{ input.task_description }}"
      working_directory: "{{ input.working_directory }}"
      initial_commands: "{{ context.validation_plan }}"
      max_turns: "3"
    resolver:
      type: rule
      rules:
        - condition: "result.status == 'success'"
          transition: complete
        - condition: "true"
          transition: complete_with_issues
    publishes:
      - terminal_output

  complete:
    action: noop
    description: "Validation passed"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "Project validation passed"

  complete_with_issues:
    action: noop
    description: "Validation found issues"
    context:
      optional: [terminal_output]
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "failed"
        last_result: "Validation failed: {{ context.terminal_output[:200] if context.terminal_output else 'execution error' }}"

  failed:
    action: noop
    description: "Validation planning failed"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "failed"
        last_result: "Could not plan validation for the project"

entry: gather_context

overflow:
  strategy: split
  fallback: reorganize
