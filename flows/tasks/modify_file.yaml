flow: modify_file
version: 4
description: >
  Modify existing files via AST-aware symbol-level editing.
  No create_fallback — if the target file doesn't exist, returns a
  clear error to mission_control with the project's actual file list.
  The director can then choose to create the file or re-target.
  
  AST path: extract symbols → select targets → rewrite sequentially.
  Full-rewrite fallback only when AST extraction is unavailable or
  the model explicitly requests it.

input:
  required:
    - mission_id
    - task_id
    - target_file_path
  optional:
    - task_description
    - mission_objective
    - working_directory
    - reason
    - relevant_notes
    - mode  # "fix" or "refactor", default "fix"

defaults:
  config:
    temperature: "t*0.6"

steps:

  # ── Phase 1: Context gathering ──────────────────────────────

  gather_context:
    use: gather_project_context
    params:
      context_budget: 10
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: read_target

  read_target:
    use: read_target_file
    resolver:
      type: rule
      rules:
        - condition: "result.file_found == true"
          transition: extract_symbols
        - condition: "true"
          transition: error_file_not_found

  # ── Phase 2: AST extraction ─────────────────────────────────

  extract_symbols:
    action: extract_symbol_bodies
    description: "Parse target file with tree-sitter and extract function/class bodies"
    context:
      required: [target_file]
    resolver:
      type: rule
      rules:
        - condition: "result.symbols_extracted > 0"
          transition: ast_edit
        - condition: "true"
          transition: full_rewrite
    publishes:
      - symbol_table
      - symbol_menu_options

  # ── Phase 3a: AST edit session ──────────────────────────────

  ast_edit:
    action: flow
    description: "Memoryful AST-aware edit session"
    flow: ast_edit_session
    input_map:
      file_path: "{{ input.target_file_path }}"
      file_content: "{{ context.target_file.content }}"
      symbol_table: "{{ context.symbol_table }}"
      symbol_menu_options: "{{ context.symbol_menu_options }}"
      task_description: "{{ input.task_description }}"
      reason: "{{ input.reason }}"
      mode: "{{ input.mode | default('fix') }}"
      relevant_notes: "{{ input.relevant_notes }}"
      working_directory: "{{ input.working_directory }}"
    resolver:
      type: rule
      rules:
        - condition: "result.status == 'success'"
          transition: validate
        - condition: "result.status == 'full_rewrite_requested'"
          transition: full_rewrite
        - condition: "result.status == 'bail'"
          transition: bail
        - condition: "true"
          transition: failed
    publishes:
      - files_changed
      - edit_summary
      - bail_reason

  # ── Phase 3b: Full file rewrite fallback ────────────────────

  full_rewrite:
    action: inference
    description: "Full file rewrite — when AST editing unavailable or structural change needed"
    context:
      required: [target_file]
      optional: [context_bundle, project_manifest, repo_map_formatted]
    prompt: |
      You are a code modification module in an automated pipeline.
      Your output will be parsed for file blocks and written directly to disk.

      ## Task
      {{ input.task_description }}

      {% if input.reason %}
      ## Reason
      {{ input.reason }}
      {% endif %}

      ## Current File: {{ input.target_file_path }}
      ```
      {{ context.target_file.content }}
      ```

      {% if context.context_bundle and context.context_bundle.files %}
      ## Related Files (READ-ONLY REFERENCE)
      {% for file in context.context_bundle.files %}
      {% if file.path != input.target_file_path %}
      ──── {{ file.path }} ────
      {{ file.content[:1000] }}
      {% endif %}
      {% endfor %}
      {% endif %}

      {% if input.relevant_notes %}
      ## Architecture & Import Conventions
      {{ input.relevant_notes }}

      CRITICAL: When modifying this file, maintain correct imports from
      other project modules. Do NOT redefine types that exist in other files.
      {% endif %}

      Produce the COMPLETE modified file. Preserve all working code.
      Change only what is needed to address the task.

      === FILE: {{ input.target_file_path }} ===
      ```
      # complete modified file content
      ```

      RULES:
      - One file block with the COMPLETE modified file.
      - Preserve all functionality not related to the modification.
      - NOTHING before the file block or after it.
    config:
      temperature: 0.3
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: write_rewrite
        - condition: "true"
          transition: failed
    publishes:
      - inference_response

  write_rewrite:
    action: apply_multi_file_changes
    description: "Write full-rewrite output to disk"
    context:
      required: [inference_response]
    params:
      content_key: "inference_response"
    resolver:
      type: rule
      rules:
        - condition: "result.files_written > 0"
          transition: validate
        - condition: "true"
          transition: failed
    publishes:
      - files_changed

  # ── Phase 4: Validation ─────────────────────────────────────

  validate:
    action: validate_created_files
    description: "Validate modified files"
    context:
      optional: [files_changed, project_manifest]
    resolver:
      type: rule
      rules:
        - condition: "result.status == 'success'"
          transition: complete
        - condition: "result.status == 'issues'"
          transition: complete
        - condition: "result.status == 'skipped'"
          transition: complete
        - condition: "true"
          transition: complete_with_issues
    publishes:
      - validation_results

  # ── Terminal paths ──────────────────────────────────────────

  complete:
    action: noop
    description: "File modified successfully"
    context:
      optional: [files_changed, edit_summary]
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "{{ context.edit_summary or 'Modified ' + input.target_file_path }}"

  complete_with_issues:
    action: noop
    description: "File modified but validation found issues"
    context:
      optional: [files_changed, validation_results]
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "Modified {{ input.target_file_path }} with validation issues — director should review"

  error_file_not_found:
    action: noop
    description: "Target file not found — clear error, no silent fallback"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "failed"
        last_result: "File not found: {{ input.target_file_path }}. Cannot modify a file that does not exist. Use create_file to create it first, or select a different target."

  bail:
    action: push_note
    description: "Model determined this file doesn't need changes or the task targets the wrong file — save observation and inform director"
    context:
      optional: [edit_summary, target_file, bail_reason]
    params:
      content_key: "bail_reason"
      category: "approach_rejected"
      tags: ["bail", "wrong_target"]
      source_flow: "modify_file"
      source_task: "{{ input.task_id }}"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "diagnosed"
        last_result: "BAIL on {{ input.target_file_path }}: {{ context.bail_reason or 'File does not need the requested changes' }}. Original task: {{ input.task_description }}"

  failed:
    action: noop
    description: "Modification failed"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "failed"
        last_result: "Failed to modify {{ input.target_file_path }}"

entry: gather_context

overflow:
  strategy: split
  fallback: reorganize
