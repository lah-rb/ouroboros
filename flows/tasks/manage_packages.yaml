flow: manage_packages
version: 2
description: >
  Install, remove, or update project dependencies.

input:
  required:
    - mission_id
    - task_id
  optional:
    - task_description
    - mission_objective
    - working_directory
    - target_file_path
    - reason
    - relevant_notes

defaults:
  config:
    temperature: "t*0.6"

steps:

  gather_context:
    use: gather_project_context
    params:
      context_budget: 8
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: execute

  execute:
    action: inference
    description: "Execute the task via inference"
    context:
      optional: [context_bundle, project_manifest, repo_map_formatted]
    prompt: |
      You are a package management module. Determine which packages need to be installed or updated, and produce the commands or config changes needed.

      ## Package Task
      {{ input.task_description }}

      Project objective: {{ input.mission_objective }}

      {% if input.relevant_notes %}
      ## Architecture & Notes
      {{ input.relevant_notes }}
      {% endif %}

      {% if context.repo_map_formatted %}
      ## Project Structure
      {{ context.repo_map_formatted }}
      {% endif %}

      {% if context.context_bundle and context.context_bundle.files %}
      ## Project Files
      {% for file in context.context_bundle.files %}
      === {{ file.path }} ===
      {{ file.content[:1500] }}
      {% endfor %}
      {% endif %}

      If you need to create or update files, use this format:

      === FILE: path/to/file ===
      ```
      content
      ```

      Create ALL files needed. If no files need creating, provide analysis as plain text.
    config:
      temperature: 0.4
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: process_output
        - condition: "true"
          transition: failed
    publishes:
      - inference_response

  process_output:
    action: apply_multi_file_changes
    description: "Write any file blocks to disk"
    context:
      required: [inference_response]
    params:
      content_key: "inference_response"
    resolver:
      type: rule
      rules:
        - condition: "result.files_written > 0"
          transition: complete
        - condition: "true"
          transition: complete_no_files
    publishes:
      - files_changed

  complete:
    action: noop
    description: "Task complete with files"
    context:
      optional: [files_changed]
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "Completed: {{ input.task_description[:100] }}. Files: {{ context.files_changed | join(', ') if context.files_changed else 'none' }}"

  complete_no_files:
    action: noop
    description: "Task complete — analysis only"
    context:
      optional: [inference_response]
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "{{ context.inference_response[:200] if context.inference_response else 'Completed' }}"

  failed:
    action: noop
    description: "Task failed"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "failed"
        last_result: "Failed: {{ input.task_description[:100] }}"

entry: gather_context

overflow:
  strategy: split
  fallback: reorganize
