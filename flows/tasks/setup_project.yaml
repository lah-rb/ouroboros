flow: setup_project
version: 2
description: >
  Initialize project tooling and structure. Creates directories,
  pyproject.toml, __init__.py files, and installs dependencies.
  Uses the terminal for shell commands (mkdir, pip install, etc.)
  and inference for generating config files.

input:
  required:
    - mission_id
    - task_id
  optional:
    - task_description
    - mission_objective
    - working_directory
    - target_file_path
    - reason
    - relevant_notes
    - setup_focus

defaults:
  config:
    temperature: "t*0.4"

steps:

  gather_context:
    use: gather_project_context
    params:
      context_budget: 6
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: plan_setup

  plan_setup:
    action: inference
    description: "Determine what setup actions are needed"
    context:
      optional: [project_manifest, repo_map_formatted, context_bundle]
    prompt: |
      You are a project setup module in an automated pipeline.
      Your output will be parsed for file blocks and written to disk.

      ## Task
      {{ input.task_description }}

      Project objective: {{ input.mission_objective }}

      {% if input.setup_focus %}
      Focus: {{ input.setup_focus }}
      {% endif %}

      {% if input.relevant_notes %}
      ## Architecture & Notes
      {{ input.relevant_notes }}
      {% endif %}

      {% if context.project_manifest %}
      ## Existing Files
      {% for filepath in context.project_manifest.keys() %}
      - {{ filepath }}
      {% endfor %}
      {% endif %}

      Generate ALL configuration and setup files needed. This includes:
      - pyproject.toml with dependencies
      - __init__.py files if the architecture uses package imports
      - README.md skeleton
      - Any other configuration files

      Use this format for each file:

      === FILE: pyproject.toml ===
      ```toml
      [project]
      name = "project-name"
      ...
      ```

      === FILE: src/__init__.py ===
      ```python
      ```

      Create ALL setup files needed. NOTHING outside the file blocks.
    config:
      temperature: 0.3
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: write_files
        - condition: "true"
          transition: failed
    publishes:
      - inference_response

  write_files:
    action: apply_multi_file_changes
    description: "Write setup files to disk"
    context:
      required: [inference_response]
    params:
      content_key: "inference_response"
    resolver:
      type: rule
      rules:
        - condition: "result.files_written > 0"
          transition: run_setup_commands
        - condition: "true"
          transition: complete_no_files
    publishes:
      - files_changed

  run_setup_commands:
    action: execute_project_setup
    description: "Run setup commands (pip install, etc.)"
    context:
      optional: [files_changed, inference_response]
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: complete
    publishes: []

  complete:
    action: noop
    description: "Setup complete"
    context:
      optional: [files_changed]
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "Project setup complete. Files: {{ context.files_changed | join(', ') if context.files_changed else 'configured' }}"

  complete_no_files:
    action: noop
    description: "Setup produced no file output"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "Setup task completed — no files generated"

  failed:
    action: noop
    description: "Setup failed"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "failed"
        last_result: "Failed to set up project"

entry: gather_context

overflow:
  strategy: split
  fallback: reorganize
