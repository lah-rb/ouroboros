flow: create_tests
version: 2
description: >
  Create test files to verify module behavior. Reads the target source
  file(s) to understand the API, then generates comprehensive tests.

input:
  required:
    - mission_id
    - task_id
  optional:
    - task_description
    - mission_objective
    - working_directory
    - target_file_path
    - reason
    - relevant_notes

defaults:
  config:
    temperature: "t*0.6"

steps:

  gather_context:
    use: gather_project_context
    params:
      context_budget: 10
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: generate_tests

  generate_tests:
    action: inference
    description: "Generate test files based on project source code"
    context:
      optional: [context_bundle, project_manifest, repo_map_formatted]
    prompt: |
      You are a test generation module in an automated pipeline.
      Your output will be parsed for file blocks and written to disk.

      ## Task
      {{ input.task_description }}

      {% if input.target_file_path %}
      Primary source file to test: {{ input.target_file_path }}
      {% endif %}

      Project objective: {{ input.mission_objective }}

      {% if input.relevant_notes %}
      ## Architecture & Notes
      {{ input.relevant_notes }}
      {% endif %}

      {% if context.repo_map_formatted %}
      ## Project Structure (AST-based)
      {{ context.repo_map_formatted }}
      {% endif %}

      {% if context.context_bundle and context.context_bundle.files %}
      ## Source Files
      {% for file in context.context_bundle.files %}
      === {{ file.path }} ===
      {{ file.content[:2000] }}
      {% endfor %}
      {% endif %}

      Generate comprehensive test file(s). For each test file:
      - Import the module under test
      - Test the public API: constructors, methods, edge cases
      - Test error handling paths
      - Use descriptive test names

      === FILE: tests/test_example.py ===
      ```python
      # complete test file
      ```

      Create ALL test files needed. NOTHING outside the file blocks.
    config:
      temperature: 0.3
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: write_tests
        - condition: "true"
          transition: failed
    publishes:
      - inference_response

  write_tests:
    action: apply_multi_file_changes
    description: "Write test files to disk"
    context:
      required: [inference_response]
    params:
      content_key: "inference_response"
    resolver:
      type: rule
      rules:
        - condition: "result.files_written > 0"
          transition: validate
        - condition: "true"
          transition: failed
    publishes:
      - files_changed

  validate:
    action: validate_created_files
    description: "Validate test files — syntax check"
    context:
      required: [files_changed]
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: complete
    publishes:
      - validation_results

  complete:
    action: noop
    description: "Tests created"
    context:
      optional: [files_changed]
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "Created test files: {{ context.files_changed | join(', ') if context.files_changed else 'tests' }}"

  failed:
    action: noop
    description: "Test creation failed"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "failed"
        last_result: "Failed to create tests"

entry: gather_context

overflow:
  strategy: split
  fallback: reorganize
