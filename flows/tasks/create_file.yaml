flow: create_file
version: 2
description: >
  Create one or more source files. Gathers project context, generates
  file content via inference, writes to disk, validates, and reports
  results. No correction loop — if validation finds issues, they are
  reported back to mission_control for the director to decide next steps.
  The prompt encourages the model to create ALL files needed for the task,
  not just a single file.

input:
  required:
    - mission_id
    - task_id
  optional:
    - task_description
    - mission_objective
    - working_directory
    - target_file_path
    - reason
    - relevant_notes

defaults:
  config:
    temperature: "t*0.6"

steps:

  # ── Phase 1: Context gathering ──────────────────────────────

  gather_context:
    use: gather_project_context
    params:
      context_budget: 10
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: generate_content

  # ── Phase 2: Generate file content ──────────────────────────

  generate_content:
    action: inference
    description: "Generate complete file content for the task"
    context:
      optional: [context_bundle, project_manifest, repo_map_formatted, related_files]
    prompt: |
      You are a code generation module in an automated pipeline.
      Your output will be parsed for file blocks and written directly to disk.
      Do NOT include any text outside the file blocks — no explanation, no commentary.

      ## Task
      {{ input.task_description }}

      {% if input.target_file_path %}
      Primary target file: {{ input.target_file_path }}
      {% endif %}

      {% if input.reason %}
      ## Reason
      {{ input.reason }}
      {% endif %}

      Project objective: {{ input.mission_objective }}

      {% if input.relevant_notes %}
      ## Architecture & Import Conventions (AUTHORITATIVE)
      {{ input.relevant_notes }}

      CRITICAL IMPORT RULES:
      - Import types and functions from existing project modules. Do NOT
        redefine classes, enums, or dataclasses that already exist in other files.
      - Follow the import scheme specified above exactly (flat, package, or relative).
      - If the architecture says "engine.py imports from models.py: [GameState, Room]",
        then engine.py MUST contain "from models import GameState, Room" — not its
        own copy of those classes.
      {% endif %}

      {% if context.repo_map_formatted %}
      ## Existing Project Structure (AST-based)
      {{ context.repo_map_formatted }}
      {% endif %}

      {% if context.context_bundle and context.context_bundle.files %}
      ## Existing Files
      {% for file in context.context_bundle.files %}
      === {{ file.path }} ===
      {{ file.content[:1500] }}
      {% endfor %}
      {% endif %}

      Produce the complete content for each file needed. You may create
      MULTIPLE files if the task requires it — do not limit yourself to
      a single file. Create every file needed to complete this task well.

      Use this exact format for each file:

      === FILE: path/to/file.py ===
      ```python
      # complete file content here
      ```

      For multiple files, repeat the pattern:

      === FILE: path/to/first.py ===
      ```python
      # first file
      ```

      === FILE: path/to/second.py ===
      ```python
      # second file
      ```

      RULES:
      - Every file block MUST have a === FILE: path === header.
      - Each block contains the COMPLETE file content — no partial snippets.
      - NOTHING before the first file block or after the last.
      - Include docstrings, type annotations, and clear structure.
      - Match import conventions from existing project files.
      - Create ALL files needed for this task, not just one.
    config:
      temperature: 0.3
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: write_files
        - condition: "true"
          transition: failed
    publishes:
      - inference_response

  # ── Phase 3: Write files to disk ────────────────────────────

  write_files:
    action: apply_multi_file_changes
    description: "Parse file blocks and write to disk"
    context:
      required: [inference_response]
    params:
      content_key: "inference_response"
    resolver:
      type: rule
      rules:
        - condition: "result.files_written > 0"
          transition: validate
        - condition: "true"
          transition: failed
    publishes:
      - files_changed

  # ── Phase 4: Validate (report only, no correction loop) ────

  validate:
    action: validate_created_files
    description: "Validate created files — syntax and imports"
    context:
      required: [files_changed]
      optional: [project_manifest]
    resolver:
      type: rule
      rules:
        - condition: "result.status == 'success'"
          transition: complete
        - condition: "result.status == 'issues'"
          transition: complete_with_issues
        - condition: "result.status == 'skipped'"
          transition: complete
        - condition: "true"
          transition: complete_with_issues
    publishes:
      - validation_results

  # ── Terminal paths ──────────────────────────────────────────

  complete:
    action: noop
    description: "Files created and validated — return to mission_control"
    context:
      optional: [files_changed]
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "Created {{ context.files_changed | join(', ') if context.files_changed else input.target_file_path }}"

  complete_with_issues:
    action: noop
    description: "Files created but validation found issues — report to director"
    context:
      optional: [files_changed, validation_results]
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "Created files with validation issues. Files: {{ context.files_changed | join(', ') if context.files_changed else input.target_file_path }}. Director should review and decide if modifications are needed."

  failed:
    action: noop
    description: "File creation failed"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "failed"
        last_result: "Failed to create {{ input.target_file_path or 'files' }}"

entry: gather_context

overflow:
  strategy: split
  fallback: reorganize
