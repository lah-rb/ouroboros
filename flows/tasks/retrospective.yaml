flow: retrospective
version: 3
description: >
  Capture learnings from frustration recovery — what worked after struggling.
  Saves analysis as a mission note (accessible to all future director reasoning),
  NOT as a file on disk. Only fires on frustration reset (task succeeded after
  elevated frustration).

input:
  required:
    - mission_id
  optional:
    - task_id
    - task_description
    - mission_objective
    - working_directory
    - target_file_path
    - reason
    - relevant_notes
    - trigger_reason

defaults:
  config:
    temperature: "t*0.6"

steps:

  gather_context:
    use: gather_project_context
    params:
      context_budget: 8
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: execute

  execute:
    action: inference
    description: "Analyze what was tried, what failed, what ultimately worked"
    context:
      optional: [context_bundle, project_manifest, repo_map_formatted]
    prompt: |
      You are a retrospective analysis module. A task that previously failed
      multiple times has now succeeded. Analyze the pattern and extract
      reusable lessons for future tasks.

      Respond with PLAIN TEXT analysis only — no file blocks, no markdown
      headers, no === FILE: === markers. Your output will be saved as
      a persistent note that informs all future decision-making.

      Keep your analysis concise (under 500 words). Focus on:
      1. What approaches failed and why
      2. What finally worked
      3. Concrete patterns to apply or avoid in future tasks

      ## Trigger
      {{ input.trigger_reason or input.reason or input.task_description or 'Frustration recovery' }}

      Project objective: {{ input.mission_objective }}

      {% if input.relevant_notes %}
      ## Prior Notes
      {{ input.relevant_notes }}
      {% endif %}

      {% if context.repo_map_formatted %}
      ## Current Project Structure
      {{ context.repo_map_formatted }}
      {% endif %}

      {% if context.context_bundle and context.context_bundle.files %}
      ## Project Files (summaries)
      {% for file in context.context_bundle.files %}
      - {{ file.path }} ({{ file.content | length }} chars)
      {% endfor %}
      {% endif %}

      Write your analysis as plain text paragraphs. No file blocks.
    config:
      temperature: 0.4
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: save_note
        - condition: "true"
          transition: failed
    publishes:
      - inference_response

  save_note:
    action: push_note
    description: "Save retrospective analysis as a persistent mission note"
    context:
      required: [inference_response]
    params:
      content_key: "inference_response"
      category: "failure_analysis"
      tags: ["retrospective", "frustration_recovery"]
      source_flow: "retrospective"
      source_task: "{{ input.task_id }}"
    resolver:
      type: rule
      rules:
        - condition: "result.note_saved == true"
          transition: complete
        - condition: "true"
          transition: complete
    publishes: []

  complete:
    action: noop
    description: "Retrospective complete — learnings saved to mission notes"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "diagnosed"
        last_result: "Retrospective complete — learnings saved to notes"

  failed:
    action: noop
    description: "Retrospective failed"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "diagnosed"
        last_result: "Retrospective analysis failed"

entry: gather_context

overflow:
  strategy: split
  fallback: reorganize
