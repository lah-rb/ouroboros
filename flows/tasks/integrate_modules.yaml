flow: integrate_modules
version: 2
description: >
  Inspect project cohesion — check imports, interfaces, and module
  connections. Uses structural analysis + inference to identify issues.
  Reports findings back to mission_control.

input:
  required:
    - mission_id
    - task_id
  optional:
    - task_description
    - mission_objective
    - working_directory
    - relevant_notes

defaults:
  config:
    temperature: "t*0.6"

steps:

  gather_context:
    use: gather_project_context
    params:
      context_budget: 12
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: structural_check

  structural_check:
    action: validate_cross_file_consistency
    description: "Run cross-file structural analysis"
    context:
      optional: [context_bundle, project_manifest, repo_map_formatted]
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: analyze_cohesion
    publishes:
      - cross_file_results
      - cross_file_summary

  analyze_cohesion:
    action: inference
    description: "Analyze project cohesion and identify integration issues"
    context:
      optional: [cross_file_results, cross_file_summary, context_bundle, project_manifest, repo_map_formatted]
    prompt: |
      You are a project integration inspector.
      Analyze the project's cross-module cohesion and identify any issues.

      Objective: {{ input.mission_objective }}

      {% if context.cross_file_summary %}
      ## Structural Analysis
      {{ context.cross_file_summary }}
      {% endif %}

      {% if context.repo_map_formatted %}
      ## Project Structure (AST-based)
      {{ context.repo_map_formatted }}
      {% endif %}

      {% if context.context_bundle and context.context_bundle.files %}
      ## Source Files
      {% for file in context.context_bundle.files %}
      === {{ file.path }} ===
      {{ file.content[:1200] }}
      {% endfor %}
      {% endif %}

      Identify:
      1. Missing or incorrect imports
      2. Interface mismatches (function signatures don't match caller expectations)
      3. Circular dependencies
      4. Dead code or unused modules
      5. Integration issues that would prevent the project from running

      Write a concise integration report. For each issue, specify the file and line.
    config:
      temperature: "t*0.4"
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: complete
    publishes:
      - integration_report

  complete:
    action: noop
    description: "Integration check complete"
    context:
      optional: [integration_report]
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "{{ context.integration_report[:200] if context.integration_report else 'Integration check completed' }}"

entry: gather_context

overflow:
  strategy: split
  fallback: reorganize
