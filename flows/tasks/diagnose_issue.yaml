flow: diagnose_issue
version: 2
description: >
  Methodical diagnosis of a code issue. If the target file exists, reads it
  and runs the full hypothesis pipeline. If the file doesn't exist, returns
  a structured error with the project's actual file list — no instant-fail,
  no silent bail.

input:
  required:
    - mission_id
    - task_id
  optional:
    - target_file_path
    - error_description
    - task_description
    - mission_objective
    - error_output
    - working_directory
    - relevant_notes

defaults:
  config:
    temperature: "t*0.6"

steps:

  # ── Phase 1: Gather context ────────────────────────────────

  gather_context:
    use: gather_project_context
    params:
      context_budget: 6
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: check_target

  check_target:
    action: read_files
    description: "Try to read the target file"
    params:
      target: "{{ input.target_file_path }}"
    resolver:
      type: rule
      rules:
        - condition: "result.file_found == true"
          transition: reproduce_mentally
        - condition: "true"
          transition: error_file_not_found
    publishes:
      - target_file

  # ── Phase 2: Understand the problem ────────────────────────

  reproduce_mentally:
    action: inference
    description: "Trace the error execution path mentally"
    context:
      required: [target_file]
      optional: [context_bundle, project_manifest]
    prompt: |
      You are a diagnostic analysis module in an automated coding pipeline.
      Write structured analysis — not a fix, not code, just understanding.

      ## The Error
      {{ input.error_description or input.task_description }}

      {% if input.error_output %}
      ## Raw Error Output
      ```
      {{ input.error_output }}
      ```
      {% endif %}

      ## The File
      **{{ context.target_file.path }}**
      ```
      {{ context.target_file.content }}
      ```

      {% if context.context_bundle and context.context_bundle.files %}
      ## Related Files
      {% for file in context.context_bundle.files %}
      {% if file.path != context.target_file.path %}
      **{{ file.path }}** (excerpt):
      ```
      {{ file.content[:800] }}
      ```
      {% endif %}
      {% endfor %}
      {% endif %}

      ## Your Task
      1. Trace the execution path that leads to this error.
      2. Identify the EXACT line(s) where the problem originates.
      3. Explain WHY the error occurs.
      4. Do NOT suggest fixes yet.

      Respond with: Error location, Execution trace, Root cause, Violated assumption.
    config:
      temperature: "t*0.4"
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: form_hypotheses
        - condition: "true"
          transition: failed
    publishes:
      - error_analysis

  # ── Phase 3: Generate hypotheses ───────────────────────────

  form_hypotheses:
    action: inference
    description: "Generate 2-3 distinct fix hypotheses"
    context:
      required: [target_file, error_analysis]
      optional: [context_bundle]
    prompt: |
      You are a hypothesis generation module.

      ## Error Analysis
      {{ context.error_analysis }}

      ## Target File
      **{{ context.target_file.path }}**
      ```
      {{ context.target_file.content }}
      ```

      Propose 2-3 DISTINCT fix approaches. For each:
      1. What specific change would fix it
      2. Why this addresses the root cause
      3. Risk and scope
      4. Confidence: low / medium / high

      Order from most to least likely. Prefer minimal changes.
    config:
      temperature: "t*0.8"
    resolver:
      type: rule
      rules:
        - condition: "result.tokens_generated > 0"
          transition: compile_diagnosis
        - condition: "true"
          transition: failed
    publishes:
      - hypotheses

  # ── Phase 4: Compile and create fix task ───────────────────

  compile_diagnosis:
    action: compile_diagnosis
    description: "Assemble final structured diagnosis"
    context:
      required: [error_analysis, hypotheses]
      optional: [target_file]
    params:
      include_rejected_hypotheses: true
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: create_fix_task
    publishes:
      - diagnosis

  create_fix_task:
    action: create_fix_task_from_diagnosis
    description: "Create a follow-up fix task from the diagnosis"
    context:
      required: [diagnosis]
      optional: [target_file, error_analysis]
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: complete
    publishes:
      - fix_task_created

  # ── Terminal paths ──────────────────────────────────────────

  complete:
    action: noop
    description: "Diagnosis complete"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "success"
        last_result: "Diagnosed issue in {{ input.target_file_path }}"

  error_file_not_found:
    action: scan_project
    description: "File not found — scan project and report what exists"
    params:
      root: "."
    resolver:
      type: rule
      rules:
        - condition: "true"
          transition: report_file_not_found
    publishes:
      - project_manifest

  report_file_not_found:
    action: noop
    description: "Report the missing file with available file list"
    context:
      optional: [project_manifest]
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "failed"
        last_result: "File not found: {{ input.target_file_path }}. Project files: {{ context.project_manifest.keys() | list | join(', ') if context.project_manifest else 'empty project' }}. Consider creating the file first or selecting a different target."

  failed:
    action: noop
    description: "Diagnosis failed"
    tail_call:
      flow: mission_control
      input_map:
        mission_id: "{{ input.mission_id }}"
        last_task_id: "{{ input.task_id }}"
        last_status: "failed"
        last_result: "Failed to diagnose issue in {{ input.target_file_path }}"

entry: gather_context

overflow:
  strategy: split
  fallback: reorganize
