flow: test_simple
version: 1
description: "A simple test flow: read a file → check condition → branch → terminal"

input:
  required:
    - target_file_path
  optional:
    - reason

defaults:
  config:
    temperature: 0.0

steps:
  read_file:
    action: read_files
    description: "Read the target file from disk"
    context:
      required: []
      optional: []
    params:
      target: "{{ input.target_file_path }}"
    resolver:
      type: rule
      rules:
        - condition: "result.file_found == true"
          transition: process_content
        - condition: "result.file_found == false"
          transition: file_not_found
    publishes:
      - target_file
      - related_files

  process_content:
    action: transform
    description: "Process the file content (passthrough for now)"
    context:
      required: [target_file]
      optional: []
    params:
      pass_through:
        - target_file
      set_values:
        processing_result: "Content processed successfully"
    resolver:
      type: rule
      rules:
        - condition: "result.transformed == true"
          transition: complete
    publishes:
      - processing_result

  complete:
    action: log_completion
    description: "Log successful completion"
    context:
      required: [target_file, processing_result]
      optional: []
    params:
      message: "Successfully read and processed file"
    terminal: true
    status: success
    publishes:
      - summary

  file_not_found:
    action: log_completion
    description: "Log file not found"
    context:
      required: []
      optional: []
    params:
      message: "Target file was not found"
    terminal: true
    status: failed
    publishes:
      - summary

entry: read_file

overflow:
  strategy: split
  fallback: reorganize
