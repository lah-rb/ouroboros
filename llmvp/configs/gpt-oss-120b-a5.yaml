app:
  host: "0.0.0.0"
  port: 8008
  log_level: "info"
  cors_origins: ["*"]
  backend_timeout: 180

graphql:
  max_query_depth: 10
  max_tokens: 131072
  max_aliases: 50
  introspection_enabled: true

model:
  name: "gpt-oss-120b-a5"
  family: "harmony"
  path: /Users/lah-rb/.lmstudio/models/unsloth/gpt-oss-120b-GGUF/gpt-oss-120b-F16.gguf
  n_ctx: 131072
  n_gpu_layers: -1   
  seed: -1
  verbose: false
  flash_attention: true
  batch_size: 512

prompt:
  persona_file: "./knowledge/SOUL.md"

generation:
  max_tokens_default: 131072
  temperature_default: 1.0
  top_p: 1.0
  top_k: 0
  min_p: 0.00
  presence_penalty: 0.0
  repeat_penalty: 1.05
  streaming_default: true

knowledge:
  tokens_bin: "./data/gpt-oss-120b-a5.tokens.bin"
  token_limit: 32768

resources:
  cpu_threads: 15
  max_concurrent_requests: 1
  jit_concurrency_limit: null  

tools:
  enabled: false
  max_iterations: 3

logging:
  enabled: true
  directory: "./logs"
