app:
  host: "0.0.0.0"
  port: 8008
  log_level: "info"
  cors_origins: ["*"]
  backend_timeout: 180

graphql:
  max_query_depth: 10
  max_tokens: 131072
  max_aliases: 50
  introspection_enabled: true

model:
  name: "devstral-2-small-24b"
  family: "chatml"
  path: /Users/lah-rb/.lmstudio/models/mistralai/Devstral-Small-2505-GGUF/Devstral-Small-2505-Q6_K.gguf
  n_ctx: 131072
  n_gpu_layers: -1   
  seed: -1
  verbose: false
  flash_attention: true
  batch_size: 512

prompt:
  persona_file: "./knowledge/SOUL.md"

generation:
  max_tokens_default: 131072
  temperature_default: 0.7
  top_p: 0.95
  top_k: 0
  min_p: 0.00
  presence_penalty: 0.0
  repeat_penalty: 1.05
  streaming_default: true

knowledge:
  tokens_bin: "./data/devstral-2-small-24b.tokens.bin"
  token_limit: 32768

resources:
  cpu_threads: 15
  max_concurrent_requests: 1
  jit_concurrency_limit: null  

tools:
  enabled: false
  max_iterations: 3

logging:
  enabled: true
  directory: "./logs"
